<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#191223">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>CarManager · Essene 1995</title>
<meta property="og:title" content="CarManager · Essene 1995">
<meta property="og:description" content="Tweedehands wagens, verse papieren en veel Red Bull. Een louche autohandel-game, gratis in je browser.">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#120d1d; --bg2:#1c1430; --card:#281e3c; --card2:#33274b;
  --edge:#4a3c66; --edge2:#655388; --txt:#f3ecdf; --dim:#a89dc2;
  --amber:#ffb347; --pink:#ff5d9e; --green:#72e08e; --red:#ff6b5e; --blue:#6cc4ff;
  --shadow:0 6px 20px rgba(0,0,0,.5);
  --hfont:"Barlow Condensed","Trebuchet MS",sans-serif;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
  font-family:"Trebuchet MS",Verdana,system-ui,sans-serif;font-size:15px;
  min-height:100%; overscroll-behavior:none}
body{background:
  radial-gradient(1200px 520px at 75% -12%, #34224f 0%, transparent 60%),
  radial-gradient(900px 480px at -5% 108%, #2b1837 0%, transparent 55%),
  linear-gradient(180deg,#171126 0%, #120d1d 100%)}
#hdr{position:sticky;top:0;z-index:30;display:none;gap:7px;align-items:center;
  padding:8px 12px;background:rgba(17,11,27,.9);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--edge);font-size:13px;flex-wrap:wrap}
#hdr .stat{display:flex;align-items:center;gap:5px;
  background:linear-gradient(180deg,#352852,#281e3c);
  border:1px solid var(--edge);border-radius:20px;padding:4px 11px;white-space:nowrap;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06)}
#hdr .cash{color:var(--green);font-weight:bold}
#hdr .heatv{color:var(--red)} #hdr .repv{color:var(--amber)}
#view{max-width:760px;margin:0 auto;padding:14px 12px 88px}
#nav{position:fixed;bottom:0;left:0;right:0;z-index:30;display:none;
  background:rgba(17,11,27,.94);backdrop-filter:blur(10px);
  border-top:1px solid var(--edge);justify-content:center}
#nav .tabs{display:flex;width:100%;max-width:760px}
#nav button{flex:1;background:none;border:none;color:var(--dim);padding:10px 2px 12px;
  font-family:inherit;font-size:11px;cursor:pointer;display:flex;flex-direction:column;
  align-items:center;gap:3px;position:relative}
#nav button .ic{font-size:20px;line-height:1;transition:transform .12s}
#nav button.on{color:var(--amber)}
#nav button.on .ic{transform:translateY(-1px) scale(1.12)}
#nav button.on::before{content:"";position:absolute;top:0;left:22%;right:22%;height:3px;
  border-radius:0 0 4px 4px;background:var(--amber);box-shadow:0 0 10px var(--amber)}
h1,h2,h3{margin:.2em 0 .4em;letter-spacing:.5px}
h2{font-family:var(--hfont);font-weight:600;font-size:25px;letter-spacing:1.4px;
  color:var(--amber);text-transform:uppercase;text-shadow:0 2px 8px rgba(255,179,71,.18)}
h3{font-family:var(--hfont);font-weight:600;font-size:18px;letter-spacing:.8px}
.card{background:linear-gradient(165deg,#2e2344 0%,#271d3b 55%,#241a37 100%);
  border:1px solid var(--edge);border-radius:16px;
  padding:14px;margin-bottom:12px;
  box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.05)}
.card.flat{box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}
.btn{display:inline-block;background:linear-gradient(180deg,#524174,#3c2f58);
  color:var(--txt);border:1px solid var(--edge2);border-top-color:#7a689f;border-radius:12px;
  padding:10px 15px;font-family:inherit;font-size:14px;font-weight:bold;cursor:pointer;
  margin:3px 4px 3px 0;text-align:center;
  box-shadow:0 3px 8px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.08)}
.btn:active{transform:translateY(1px);box-shadow:0 1px 3px rgba(0,0,0,.35)}
.btn.primary{background:linear-gradient(180deg,#ffd07d,#ea9c2b);color:#33200a;
  border-color:#c47f1d;border-top-color:#ffe4b0;text-shadow:0 1px 0 rgba(255,255,255,.28)}
.btn.shady{background:linear-gradient(180deg,#7d3d6d,#54254a);border-color:#94517f;
  border-top-color:#aa6896;color:#ffd9ec}
.btn.danger{background:linear-gradient(180deg,#b04a45,#83302c);border-color:#c25c5c;border-top-color:#d18884}
.btn.ghost{background:rgba(255,255,255,.02);border:1px dashed var(--edge);color:var(--dim);box-shadow:none}
.btn:disabled{opacity:.4;pointer-events:none}
.btn.block{display:block;width:100%}
.pill{display:inline-block;font-size:11px;border-radius:20px;padding:2.5px 9px;margin:1.5px 3px 1.5px 0;
  background:rgba(255,255,255,.045);border:1px solid var(--edge);color:var(--dim)}
.pill.good{color:var(--green);border-color:#3f7a4e;background:rgba(114,224,142,.07)}
.pill.bad{color:var(--red);border-color:#8a4642;background:rgba(255,107,94,.07)}
.pill.warn{color:var(--amber);border-color:#8a6d34;background:rgba(255,179,71,.07)}
.pill.info{color:var(--blue);border-color:#3f6a8d;background:rgba(108,196,255,.07)}
.money{color:var(--green);font-weight:bold}
.neg{color:var(--red);font-weight:bold}
.dim{color:var(--dim)} .small{font-size:12px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.spread{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:520px){.grid2{grid-template-columns:1fr}}
.bar{height:8px;border-radius:6px;background:#191225;overflow:hidden;border:1px solid var(--edge)}
.bar i{display:block;height:100%;border-radius:6px}
.swatch{display:inline-block;width:13px;height:13px;border-radius:4px;border:1px solid rgba(255,255,255,.35);vertical-align:-2px;margin-right:4px}
.carline{display:flex;gap:12px;align-items:center;padding:10px 12px;border:1px solid var(--edge);
  border-radius:14px;margin-bottom:10px;cursor:pointer;
  background:linear-gradient(165deg,#352a50 0%,#2c2143 60%,#281e3c 100%);
  box-shadow:0 4px 12px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.05);
  transition:border-color .1s, transform .08s}
.carline:hover{border-color:var(--edge2)}
.carline:active{transform:scale(.99);background:#3b2f55}
.carline .em{font-size:26px}
.carpic{flex:0 0 auto;width:106px;display:flex;justify-content:center;align-items:flex-end}
.carpic svg{display:block;max-width:100%;filter:drop-shadow(0 3px 3px rgba(0,0,0,.45))}
.carpic.big{width:100%;margin:2px 0 4px}
.logline{padding:6px 2px;border-bottom:1px dashed #3a2f52;font-size:13px}
.logline:last-child{border-bottom:none}
#modal{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;
  background:rgba(8,5,15,.82);padding:14px;backdrop-filter:blur(3px)}
#modal .box{background:linear-gradient(170deg,#312547 0%,#281e3c 70%);border:1px solid var(--edge2);border-radius:18px;
  padding:18px;max-width:480px;width:100%;max-height:88vh;overflow-y:auto;
  box-shadow:0 14px 50px rgba(0,0,0,.65), inset 0 1px 0 rgba(255,255,255,.06)}
#toasts{position:fixed;top:54px;left:0;right:0;z-index:60;display:flex;flex-direction:column;
  align-items:center;gap:6px;pointer-events:none;padding:0 12px}
.toast{background:linear-gradient(180deg,#463763,#3a2e52);border:1px solid var(--amber);color:var(--txt);border-radius:12px;
  padding:9px 16px;font-size:13px;box-shadow:var(--shadow),0 0 14px rgba(255,179,71,.15);max-width:420px;animation:tpop .25s}
@keyframes tpop{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
.neon{font-family:"Bungee",var(--hfont);font-size:38px;font-weight:normal;letter-spacing:1px;text-align:center;
  color:#ffd9e8;text-shadow:0 0 6px #ff6fa5,0 0 22px #ff2f7e,0 0 46px #ff2f7e;
  animation:neonpulse 3.2s ease-in-out infinite}
@keyframes neonpulse{0%,100%{text-shadow:0 0 6px #ff6fa5,0 0 22px #ff2f7e,0 0 46px #ff2f7e}
  50%{text-shadow:0 0 4px #ff6fa5,0 0 14px #ff2f7e,0 0 30px #ff2f7e}}
.neon small{display:block;font-family:var(--hfont);font-size:14px;letter-spacing:7px;color:var(--amber);
  text-shadow:0 0 10px #ffb347;margin-top:4px}
.parade{display:flex;justify-content:center;gap:10px;align-items:flex-end;margin:14px 0 4px;flex-wrap:wrap}
.parade svg{filter:drop-shadow(0 4px 4px rgba(0,0,0,.5))}
.charcard{cursor:pointer;transition:transform .1s, border-color .1s}
.charcard:hover{border-color:var(--edge2)}
.charcard:active{transform:scale(.98)}
.charcard .face{font-size:46px;text-align:center;filter:drop-shadow(0 3px 6px rgba(0,0,0,.4))}
.slider{width:100%}
input[type=range]{accent-color:var(--amber)}
select,input[type=text]{background:var(--card2);color:var(--txt);border:1px solid var(--edge);
  border-radius:8px;padding:8px;font-family:inherit;font-size:14px}
.evbox{font-size:15px;line-height:1.45}
.center{text-align:center}
#c3dwrap{display:flex;justify-content:center;margin:8px 0}
#c3d{border-radius:14px;border:1px solid var(--edge2);
  background:linear-gradient(180deg,#2a1d42 0%,#170f24 70%,#0e0917 100%);
  box-shadow:inset 0 0 40px rgba(0,0,0,.5), 0 6px 20px rgba(0,0,0,.4)}
.plate{display:inline-block;background:#d5001c;color:#fff;font-weight:bold;border-radius:4px;
  padding:1px 7px;font-family:monospace;letter-spacing:1px;border:1px solid #fff}
.tablebtns{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.pop{position:fixed;z-index:70;transform:translate(-50%,-50%);font-weight:900;font-size:24px;
  font-family:var(--hfont);letter-spacing:1px;pointer-events:none;
  text-shadow:0 2px 8px rgba(0,0,0,.65);animation:popfly 1.1s ease-out forwards}
@keyframes popfly{0%{opacity:0;margin-top:12px;scale:.6}15%{opacity:1;scale:1.18}100%{opacity:0;margin-top:-85px;scale:1}}
.pgreen{color:var(--green)}.pred{color:var(--red)}.pamber{color:var(--amber)}.pblue{color:var(--blue)}
.stamp{position:fixed;z-index:80;left:50%;top:38%;transform:translate(-50%,-50%) rotate(-7deg);
  font-family:"Bungee",var(--hfont);font-size:min(11vw,44px);color:var(--amber);border:4px solid var(--amber);
  border-radius:14px;padding:6px 22px;background:rgba(18,13,29,.88);white-space:nowrap;
  text-shadow:0 0 18px rgba(255,179,71,.5);box-shadow:0 0 30px rgba(0,0,0,.6);
  pointer-events:none;animation:stampin 1.5s ease forwards}
.stamp.gold{color:#ffd76a;border-color:#ffd76a}
.stamp.pink{color:var(--pink);border-color:var(--pink);text-shadow:0 0 18px rgba(255,93,158,.5)}
@keyframes stampin{0%{opacity:0;transform:translate(-50%,-50%) rotate(-7deg) scale(2.4)}
  16%{opacity:1;transform:translate(-50%,-50%) rotate(-7deg) scale(1)}78%{opacity:1}100%{opacity:0}}
.reel{font-size:58px;line-height:1.25;filter:drop-shadow(0 4px 8px rgba(0,0,0,.5))}
.repline{opacity:0;animation:linein .4s ease forwards;padding:5px 2px;border-bottom:1px dashed #3a2f52}
.repline:last-child{border-bottom:none}
@keyframes linein{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:none}}
.grade{display:inline-block;font-family:"Bungee",var(--hfont);font-size:46px;border:3px solid;
  border-radius:12px;padding:2px 20px;margin:10px 0 2px;transform:rotate(-4deg)}
.oddsbar{height:9px;border-radius:6px;background:#191225;border:1px solid var(--edge);overflow:hidden;margin-top:4px}
.oddsbar i{display:block;height:100%;border-radius:6px;transition:width .15s}
.colpick{display:inline-block;width:34px;height:34px;border-radius:9px;margin:3px;cursor:pointer;
  border:2px solid rgba(255,255,255,.25);box-shadow:0 2px 6px rgba(0,0,0,.4), inset 0 2px 3px rgba(255,255,255,.25);
  transition:transform .08s}
.colpick:hover{transform:scale(1.12);border-color:#fff}
.colpick.cur{border:2px solid var(--amber);box-shadow:0 0 10px rgba(255,179,71,.5)}
.conf{position:fixed;z-index:75;width:8px;height:12px;border-radius:2px;pointer-events:none;opacity:0;
  animation:conffall 1.5s ease-in forwards}
@keyframes conffall{0%{opacity:1;transform:translate(0,0) rotate(0)}
  100%{opacity:0;transform:translate(var(--dx),var(--dy)) rotate(var(--rot))}}
.shake{animation:shake .45s}
@keyframes shake{0%,100%{transform:none}20%{transform:translate(-7px,2px)}40%{transform:translate(6px,-3px)}
  60%{transform:translate(-5px,2px)}80%{transform:translate(4px,-1px)}}
.mood{font-size:24px;vertical-align:-3px}
.scr{display:inline-block;width:64px;height:64px;line-height:62px;font-size:34px;text-align:center;
  background:linear-gradient(180deg,#9da1ab,#6a6d75);border-radius:10px;margin:4px;cursor:pointer;
  border:2px solid #b8bac2;box-shadow:inset 0 2px 4px rgba(255,255,255,.4), 0 3px 8px rgba(0,0,0,.4);
  color:#4a4d55;font-weight:900;user-select:none}
.scr.open{background:#191225;border-color:var(--edge2);cursor:default;color:inherit}
.duel{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin:2px 0 6px}
.actor{text-align:center;min-width:64px;flex:0 0 auto}
.dface{font-size:44px;line-height:1.15;filter:drop-shadow(0 3px 6px rgba(0,0,0,.45));animation:idlebob 2.8s ease-in-out infinite}
.actor.right .dface{animation-delay:1.4s}
@keyframes idlebob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.bubcol{flex:1;min-width:0}
.bub{position:relative;border-radius:12px;padding:7px 11px;font-size:13px;line-height:1.35;margin:4px 0;animation:bubin .2s ease}
.bub.you{background:rgba(76,120,255,.14);border:1px solid #4a5ea8;margin-right:14%}
.bub.them{background:rgba(255,93,158,.10);border:1px solid #7c4a63;margin-left:14%}
@keyframes bubin{from{opacity:0;transform:translateY(5px) scale(.95)}to{opacity:1;transform:none}}
.choicebtn{display:block;width:100%;text-align:left;margin:5px 0;font-weight:normal;font-size:13px}
.roadscene{position:relative;height:215px;border-radius:14px;overflow:hidden;margin:2px 0;
  background:linear-gradient(180deg,#181040 0%,#472a5e 38%,#a04e6e 52%,#221a38 52.5%)}
.rs-sun{position:absolute;left:64%;top:16%;width:38px;height:38px;border-radius:50%;
  background:radial-gradient(circle,#ffd76a,#ff8a5c 70%);box-shadow:0 0 26px #ff8a5c;opacity:.9}
.rs-trees{position:absolute;top:38%;left:0;white-space:nowrap;font-size:27px;animation:scrollx 7s linear infinite}
.rs-posts{position:absolute;top:60%;left:0;white-space:nowrap;font-size:15px;opacity:.8;animation:scrollx 2.6s linear infinite}
@keyframes scrollx{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.rs-road{position:absolute;left:0;right:0;bottom:0;height:36%;background:#241e33;border-top:3px solid #40385c}
.rs-dash{position:absolute;left:0;right:0;bottom:16%;height:5px;
  background:repeating-linear-gradient(90deg,#e8d98a 0 34px,transparent 34px 82px);animation:dashmove .45s linear infinite}
@keyframes dashmove{from{background-position:0 0}to{background-position:-82px 0}}
.rs-car{position:absolute;left:24%;bottom:8%;animation:carbob .4s ease-in-out infinite}
@keyframes carbob{0%,100%{transform:translateY(0) rotate(-.4deg)}50%{transform:translateY(-3px) rotate(.4deg)}}
.rs-txt{position:absolute;left:0;right:0;top:9px;text-align:center;color:#f3ecdf;font-size:13px;text-shadow:0 1px 5px #000}
.rs-puff{position:absolute;width:10px;height:10px;border-radius:50%;background:rgba(200,200,210,.4);
  animation:puff 1s ease-out infinite}
@keyframes puff{0%{opacity:.7;transform:translate(0,0) scale(.5)}100%{opacity:0;transform:translate(-26px,-14px) scale(1.6)}}
.roadscene.night{background:linear-gradient(180deg,#05040f 0%,#141030 45%,#1c1430 52%,#16121f 52.5%)}
.roadscene.night .rs-sun{background:radial-gradient(circle,#e8e6df,#9aa 70%);box-shadow:0 0 18px #ccd;width:26px;height:26px}
.rs-beam{position:absolute;bottom:14%;width:120px;height:26px;
  background:linear-gradient(90deg,rgba(255,240,180,.35),transparent 85%);
  clip-path:polygon(0 40%,100% 0,100% 100%,0 60%);pointer-events:none}
.rs-stars{position:absolute;top:6%;left:0;right:0;font-size:9px;letter-spacing:38px;opacity:.7}
/* living lot */
.lot{position:relative;height:158px;border-radius:14px;overflow:hidden;margin-bottom:12px;
  border:1px solid var(--edge);background:linear-gradient(180deg,#1d1640 0%,#3d2a58 52%,#33283f 52.5%,#3a3044 100%)}
.lot-sun{position:absolute;right:14%;top:12%;width:26px;height:26px;border-radius:50%;
  background:radial-gradient(circle,#ffd76a,#ff9a5c 75%);box-shadow:0 0 18px rgba(255,170,90,.7)}
.lot-clouds{position:absolute;top:8%;left:0;white-space:nowrap;font-size:16px;opacity:.55;letter-spacing:70px;animation:scrollx 60s linear infinite}
.lot-fence{position:absolute;left:0;right:0;top:37%;height:16%;
  background:repeating-linear-gradient(90deg,#4a3c66 0 3px,transparent 3px 14px);border-bottom:2px solid #4a3c66;opacity:.8}
.lot-office{position:absolute;left:6%;top:26%;width:78px;height:27%;background:linear-gradient(180deg,#5d5470,#453e57);
  border-radius:3px;border:1px solid #6a6180;box-shadow:0 3px 8px rgba(0,0,0,.4)}
.lot-office:before{content:"";position:absolute;left:8px;top:6px;width:22px;height:12px;background:#ffe9a8;border-radius:2px;
  box-shadow:34px 0 0 #ffd76a;animation:offlight 7s steps(1) infinite}
@keyframes offlight{0%,88%{opacity:1}89%,93%{opacity:.35}94%,100%{opacity:1}}
.lot-office:after{content:"CARMANAGER";position:absolute;left:0;right:0;top:-13px;text-align:center;
  font-family:var(--hfont);font-size:9px;letter-spacing:1.5px;color:var(--amber);text-shadow:0 0 6px rgba(255,179,71,.6)}
.lot-halte{position:absolute;right:7%;top:24%;font-size:22px}
.lot-halte:after{content:"Koudenberg";position:absolute;top:-11px;left:-14px;font-size:8px;color:var(--dim);white-space:nowrap}
.lot-bus{position:absolute;top:33%;left:-15%;font-size:30px;animation:busride 21s linear infinite}
@keyframes busride{0%{transform:translateX(-40px) scaleX(-1)}18%{transform:translateX(64vw) scaleX(-1)}
  30%{transform:translateX(64vw) scaleX(-1)}48%{transform:translateX(120vw) scaleX(-1)}100%{transform:translateX(120vw) scaleX(-1)}}
.lot-ground{position:absolute;left:0;right:0;bottom:0;height:48%;
  background:radial-gradient(1.6px 1.6px at 12% 30%,#57506a 50%,transparent 51%),radial-gradient(1.6px 1.6px at 34% 62%,#57506a 50%,transparent 51%),
  radial-gradient(1.6px 1.6px at 58% 38%,#57506a 50%,transparent 51%),radial-gradient(1.6px 1.6px at 79% 70%,#57506a 50%,transparent 51%),
  radial-gradient(1.6px 1.6px at 91% 34%,#57506a 50%,transparent 51%)}
.lot-car{position:absolute;bottom:7%;animation:idlebob 4s ease-in-out infinite}
.lot-char{position:absolute;bottom:12%;right:11%;font-size:27px;filter:drop-shadow(0 3px 4px rgba(0,0,0,.5));animation:idlebob 3s ease-in-out infinite}
.lot-smoke{position:absolute}
.lot-smoke i{position:absolute;width:5px;height:5px;border-radius:50%;background:rgba(210,210,220,.45);animation:cigsmoke 2.4s ease-out infinite}
.lot-smoke i:nth-child(2){animation-delay:.8s}.lot-smoke i:nth-child(3){animation-delay:1.6s}
@keyframes cigsmoke{0%{opacity:.7;transform:translate(0,0) scale(.6)}100%{opacity:0;transform:translate(-9px,-26px) scale(1.7)}}
.lot-duif{position:absolute;bottom:9%;left:42%;font-size:15px;animation:duifhop 5s ease-in-out infinite}
@keyframes duifhop{0%,20%,100%{transform:translate(0,0)}25%{transform:translate(9px,-7px)}30%,60%{transform:translate(16px,0)}
  65%{transform:translate(26px,-6px)}70%,95%{transform:translate(34px,0)}}
/* sale drive-off */
.driveoff{position:fixed;z-index:85;left:-40%;bottom:34%;pointer-events:none;animation:driveoff 1.7s ease-in forwards}
@keyframes driveoff{0%{transform:translateX(0)}12%{transform:translateX(48vw) rotate(-.5deg)}100%{transform:translateX(190vw) rotate(.5deg)}}
.driveoff .rs-puff{left:-6px;bottom:6px}
/* workshop scene */
.fixwrap{position:relative;display:inline-block;margin:4px 0}
.fixtool{position:absolute;top:-8%;left:42%;font-size:32px;animation:wrenchwork .45s ease-in-out infinite;transform-origin:70% 80%}
@keyframes wrenchwork{0%,100%{transform:rotate(-14deg) translateY(0)}50%{transform:rotate(16deg) translateY(5px)}}
.fixtool.spray{animation:spraymove 1.1s ease-in-out infinite alternate}
@keyframes spraymove{from{transform:translateX(-34px) rotate(-6deg)}to{transform:translateX(34px) rotate(6deg)}}
.sparks i{position:absolute;top:26%;left:50%;width:4px;height:4px;border-radius:50%;background:#ffd76a;
  box-shadow:0 0 7px #ffb347;animation:sparkfly .55s ease-out infinite}
.sparks i:nth-child(2){animation-delay:.18s;background:#fff}.sparks i:nth-child(3){animation-delay:.36s}
@keyframes sparkfly{0%{opacity:1;transform:translate(0,0)}100%{opacity:0;transform:translate(calc(24px - 48px*var(--r,.3)),22px)}}
.mist i{position:absolute;top:18%;width:9px;height:9px;border-radius:50%;background:var(--mc,#9fd6b4);opacity:.5;
  animation:mistdrift 1.2s ease-out infinite}
.mist i:nth-child(1){left:30%}.mist i:nth-child(2){left:46%;animation-delay:.4s}.mist i:nth-child(3){left:62%;animation-delay:.8s}
@keyframes mistdrift{0%{opacity:.6;transform:translateY(0) scale(.6)}100%{opacity:0;transform:translateY(26px) scale(1.8)}}
.sweepwrap{position:relative;overflow:hidden}
.sweepwrap:after{content:"";position:absolute;top:0;bottom:0;left:-40%;width:34%;
  background:linear-gradient(105deg,transparent,rgba(255,255,255,.5),transparent);animation:sweepgo 1.1s ease-out .15s forwards}
@keyframes sweepgo{to{left:120%}}
/* fortune wheel */
.wheelwrap{position:relative;width:190px;height:190px;margin:8px auto}
.wheelptr{position:absolute;top:-9px;left:50%;transform:translateX(-50%);font-size:20px;color:var(--amber);z-index:2;
  text-shadow:0 2px 4px rgba(0,0,0,.6)}
.wheel{width:190px;height:190px;border-radius:50%;border:5px solid #6a5a8c;position:relative;
  box-shadow:0 6px 20px rgba(0,0,0,.5), inset 0 0 24px rgba(0,0,0,.35)}
.wheel .wseg{position:absolute;left:50%;top:50%;font-size:21px;margin:-13px 0 0 -13px;width:26px;height:26px;text-align:center}
.wheelhub{position:absolute;left:50%;top:50%;width:30px;height:30px;margin:-15px 0 0 -15px;border-radius:50%;
  background:radial-gradient(circle,#ffd76a,#b3924f);border:2px solid #6a5a8c;z-index:1}
/* border barrier */
.border{position:relative;height:120px;border-radius:12px;overflow:hidden;margin:6px 0;
  background:linear-gradient(180deg,#1a1433 0%,#2c2148 55%,#221c33 55.5%)}
.b-booth{position:absolute;left:9%;top:16%;font-size:34px}
.b-post{position:absolute;left:26%;bottom:38%;width:7px;height:34px;background:#8d919b;border-radius:2px}
.b-arm{position:absolute;left:27%;bottom:62%;width:150px;height:8px;border-radius:4px;transform-origin:4px 50%;
  background:repeating-linear-gradient(90deg,#d5001c 0 18px,#fff 18px 36px);box-shadow:0 2px 6px rgba(0,0,0,.5);
  transition:transform 1s cubic-bezier(.5,-.3,.4,1.3)}
.border.open .b-arm{transform:rotate(-72deg)}
.b-car{position:absolute;left:4%;bottom:6%}
.border.open .b-car{animation:passborder 1.9s ease-in .55s forwards}
@keyframes passborder{to{transform:translateX(120vw)}}
/* test drive */
.tdwrap{position:relative;border-radius:12px;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none}
.tdwrap canvas{display:block;width:100%}
.tdcar{position:absolute;bottom:4%;left:50%;pointer-events:none;filter:drop-shadow(0 4px 5px rgba(0,0,0,.55))}
.tdhud{position:absolute;top:6px;left:8px;right:8px;display:flex;justify-content:space-between;pointer-events:none;
  font-family:var(--hfont);font-size:14px;color:#fff;text-shadow:0 1px 4px #000}
.tdhud b{font-size:20px;color:var(--amber)}
.tdflick{animation:tdflick .5s steps(2) 3}
@keyframes tdflick{0%,100%{filter:brightness(1)}50%{filter:brightness(.35)}}
.tdzone{position:absolute;top:0;bottom:0;width:50%;z-index:5}
.tdhint{text-align:center;font-size:11px;color:var(--dim);margin-top:5px}
hr{border:none;border-top:1px dashed var(--edge);margin:10px 0}
::-webkit-scrollbar{width:9px}
::-webkit-scrollbar-thumb{background:#443659;border-radius:6px}
::-webkit-scrollbar-track{background:transparent}
</style>

function checkGoals(){
  if(!G||G.over||!G.goalsDone)return;
  let changed=true;
  while(changed){changed=false;
    const active=GOALS.filter(g=>!G.goalsDone.includes(g.id)).slice(0,2);
    for(const g of active){
      if(g.c()){G.goalsDone.push(g.id);changed=true;
        stamp("DOEL BEHAALD!","gold");confetti(40);sfx("win");
        toast("📋 "+g.t+" ✓ — "+g.r);
        log("📋 Doel behaald: "+g.t+" → "+g.r);
        if(g.fn)g.fn();}}}
}

function syncUID(){
  const pools=[G.cars,G.custs];
  if(G.mk){pools.push(G.mk.cars,G.mk.bought)}
  if(G.phoneDeal&&G.phoneDeal.c)pools.push([G.phoneDeal.c]);
  if(G.auction)pools.push(G.auction.lots);
  let m=0;for(const a of pools)for(const x of a||[])if(x.id>m)m=x.id;
  UID=Math.max(UID,m+1);
  // repair duplicate ids baked into old saves (pre-fix): tapping car A could open/sell car B
  const seen=new Set();
  for(const a of pools)for(const x of a||[]){if(x.id==null||seen.has(x.id))x.id=UID++;seen.add(x.id)}}

/* ============ CARS ============ */
function fairValue(c,shown,knowAll){
  const d=CARS[c.ci];
  const span=Math.max(1,d.y[1]-d.y[0]);
  const ageF=.75+.4*(c.year-d.y[0])/span;
  const expKm=(1997-c.year)*19000+15000;
  const km=shown?c.km:c.kmReal;
  const kmF=clamp(1.25-.45*(km/expKm),.5,1.3);
  const condF=.35+.75*((c.eng*.6+c.body*.4)/100);
  let qF=1+.07*(c.tuned||0);
  for(const q of c.quirks){const Q=QUIRKS.find(x=>x.id===q);
    if(Q&&(knowAll||!Q.hide||c.known.includes(q)))qF*=1+Q.v;}
  return Math.round(d.base*ageF*kmF*condF*qF/100)*100;
}
const askValue=c=>fairValue(c,true,false);   // what the market believes
const trueValue=c=>fairValue(c,false,true);  // what it is really worth
function genCar(mkey){
  const m=MARKETS[mkey];
  // weighted template pick
  let tot=0;const ws=CARS.map(d=>{
    let w=[100,38,m.rare*110,m.legend*90][d.rar];
    if(d.y[1]<1988)w*=(m.risk>=2?1.5:.45);
    if(isCh("alan")&&d.rar>=2)w*=1.4;
    tot+=w;return w});
  let r=Math.random()*tot,ci=0;
  for(let i=0;i<ws.length;i++){r-=ws[i];if(r<=0){ci=i;break}}
  const d=CARS[ci];
  const year=ri(d.y[0],Math.min(d.y[1],1995));
  const expKm=(1997-year)*19000+15000;
  const kmReal=Math.round(expKm*rnd(m.km[0],m.km[1])*rnd(.8,1.2)/1000)*1000;
  let km=kmReal;
  // sometimes the seller ALREADY rolled it back, the crooks
  if(Math.random()<m.dirty*.6){km=Math.round(kmReal*rnd(.45,.75)/1000)*1000;}
  const c={id:UID++,ci,year,km,kmReal,rolled:km<kmReal,
    eng:ri(m.cond[0],m.cond[1]),body:ri(m.cond[0],m.cond[1]),
    col:ri(0,COLORS.length-1),tuned:Math.random()<.12?1:0,
    quirks:[],known:[],papers:0,hot:false,origin:mkey,transit:false,askedBy:null};
  const nq=m.risk>=2?ri(0,3):ri(0,1);
  const pool=QUIRKS.map(q=>q.id).filter(q=>!(q==="tuned"&&c.tuned===0));
  for(let i=0;i<nq;i++){const q=pick(pool);if(!c.quirks.includes(q))c.quirks.push(q)}
  if(c.quirks.includes("tuned"))c.tuned=Math.max(c.tuned,1);
  const pr=Math.random();
  if(pr<m.fake){c.papers=2;c.hot=Math.random()<.5}
  else if(pr<m.fake+m.dirty){c.papers=1;c.hot=Math.random()<.12}
  c.ask=Math.round(trueValue(c)*m.mult*rnd(.88,1.15)/1000)*1000;
  return c;
}

function shade(hex,f){const n=parseInt(hex.slice(1),16);let r=n>>16,g=n>>8&255,b=n&255;
  const t=f<0?0:255,a=Math.abs(f);
  r=Math.round(r+(t-r)*a);g=Math.round(g+(t-g)*a);b=Math.round(b+(t-b)*a);
  return "#"+(r<<16|g<<8|b|0x1000000).toString(16).slice(1)}

function carArt(c,w){
  const sp=SPECS[c.ci],S=SHAPES[sp.s],hex=COLORS[c.col].h,uid=++AID;
  const q=c.quirks||[];
  const rust=q.includes("rust")||(c.body!=null&&c.body<32);
  const dull=c.body!=null&&c.body<45;
  const wing=sp.w||((c.tuned||0)>0?1:0);
  const FX=x=>(x+2), FY=y=>(48-y);
  const P=p=>FX(p[0]).toFixed(1)+" "+FY(p[1]).toFixed(1);
  // a third value of 1 on a point marks a sharp corner (duplicated so the curve pinches)
  const path=raw=>{const pts=raw.flatMap(p=>p[2]?[p,p]:[p]);
    const n=pts.length,mid=(a,b)=>[(a[0]+b[0])/2,(a[1]+b[1])/2];
    let s="M"+P(mid(pts[0],pts[1]));
    for(let i=1;i<=n;i++){const p=pts[i%n],m=mid(p,pts[(i+1)%n]);s+="Q"+P(p)+" "+P(m)}
    return s+"Z"};
  const poly=pts=>pts.map((p,i)=>(i?"L":"M")+P(p)).join("")+"Z";
  const bp=path(S.b);
  const W=Math.round(w*sp.len/4.6),H=Math.round(W*52/104);
  let s='<svg viewBox="0 0 104 52" width="'+W+'" height="'+H+'" xmlns="http://www.w3.org/2000/svg">';
  s+='<defs><linearGradient id="p'+uid+'" x1="0" y1="0" x2="0" y2="1">'
   +'<stop offset="0" stop-color="'+shade(hex,dull?.18:.42)+'"/>'
   +'<stop offset=".45" stop-color="'+(dull?shade(hex,-.12):hex)+'"/>'
   +'<stop offset="1" stop-color="'+shade(hex,-.4)+'"/></linearGradient>'
   +'<linearGradient id="g'+uid+'" x1="0" y1="0" x2="0" y2="1">'
   +'<stop offset="0" stop-color="#b9d4e4"/><stop offset="1" stop-color="#27384b"/></linearGradient>'
   +'<clipPath id="c'+uid+'"><path d="'+bp+'"/></clipPath></defs>';
  s+='<ellipse cx="52" cy="49" rx="'+ (48*sp.len/4.6).toFixed(0) +'" ry="2.2" fill="#000" opacity=".38"/>';
  s+='<path d="'+bp+'" fill="url(#p'+uid+')" stroke="'+shade(hex,-.62)+'" stroke-width=".7"/>';
  s+='<g clip-path="url(#c'+uid+')">';
  if(S.mod)s+='<rect x="0" y="'+FY(S.gy+4.4)+'" width="104" height="'+(S.gy+8)+'" fill="rgba(12,9,20,.3)"/>';
  const belt=Math.min(...S.win[0].map(p=>p[1]));
  s+='<path d="M'+FX(4)+' '+FY(belt-1.1).toFixed(1)+' L'+FX(97)+' '+FY(belt-1.1).toFixed(1)+'" stroke="'+shade(hex,-.3)+'" stroke-width=".55" fill="none" opacity=".8"/>';
  s+='<circle cx="'+FX(S.fw)+'" cy="'+FY(S.wr)+'" r="'+(S.wr+1.7)+'" fill="#0d0a15"/>'
    +'<circle cx="'+FX(S.rw)+'" cy="'+FY(S.wr)+'" r="'+(S.wr+1.7)+'" fill="#0d0a15"/>';
  if(rust){[[S.rw-6,S.wr+3.2],[S.rw+6.5,S.wr+2.4],[S.fw-6.5,S.wr+2.6],[S.fw+6,S.wr+3.2],[48,S.gy+2.2]]
    .forEach((p,i)=>{s+='<circle cx="'+FX(p[0])+'" cy="'+FY(p[1])+'" r="'+(0.9+(i%3)*.4)+'" fill="#6e4a2c" opacity=".8"/>'})}
  s+='</g>';
  const wheel=x=>'<circle cx="'+FX(x)+'" cy="'+FY(S.wr)+'" r="'+S.wr+'" fill="#15131c" stroke="#05040a" stroke-width=".6"/>'
   +'<circle cx="'+FX(x)+'" cy="'+FY(S.wr)+'" r="'+(S.wr*.52).toFixed(1)+'" fill="#c9c8d3" stroke="#8a8898" stroke-width=".5"/>'
   +'<circle cx="'+FX(x)+'" cy="'+FY(S.wr)+'" r="'+(S.wr*.17).toFixed(1)+'" fill="#6e6d7c"/>';
  s+=wheel(S.fw)+wheel(S.rw);
  if(S.spat)s+='<g clip-path="url(#c'+uid+')"><rect x="'+FX(S.rw-7.5)+'" y="'+FY(S.wr+6.4)+'" width="15" height="4.8" fill="url(#p'+uid+')" stroke="'+shade(hex,-.45)+'" stroke-width=".4"/></g>';
  for(const wp of S.win)s+='<path d="'+poly(wp)+'" fill="url(#g'+uid+')" stroke="#10141c" stroke-width=".5" stroke-linejoin="round"/>';
  if(S.open){const wsx=S.win[0][0][0];
    s+='<ellipse cx="'+FX(wsx-9)+'" cy="'+FY(belt-.4)+'" rx="8" ry="1.7" fill="#100d16"/>'}
  const ht=sp.hl||"rect",[hx,hy]=S.hl;
  if(ht==="pop")s+='<rect x="'+FX(hx-2.4)+'" y="'+FY(hy+.6)+'" width="5" height="1.2" rx=".4" fill="#191722"/>';
  else if(ht==="round")s+='<circle cx="'+FX(hx)+'" cy="'+FY(hy)+'" r="1.9" fill="#ffedc4" stroke="#8a744d" stroke-width=".45"/>';
  else s+='<rect x="'+FX(hx-2)+'" y="'+FY(hy+1.2)+'" width="4.4" height="2.5" rx=".5" fill="#ffe9b0" stroke="#8a744d" stroke-width=".4"/>';
  s+='<rect x="'+FX(S.tl[0]-1)+'" y="'+FY(S.tl[1]+1.1)+'" width="2.5" height="2.3" rx=".4" fill="#d93840" stroke="#5c1418" stroke-width=".35"/>';
  if(S.chrome){const by=FY(S.gy+4.6);
    s+='<rect x="'+FX(92)+'" y="'+by+'" width="10" height="2" rx="1" fill="#d8d8e2" stroke="#7c7c8a" stroke-width=".4"/>'
     +'<rect x="'+FX(-1.5)+'" y="'+by+'" width="9" height="2" rx="1" fill="#d8d8e2" stroke="#7c7c8a" stroke-width=".4"/>'}
  if(wing){const[rx,ry]=S.rd;
    if(wing===2)s+='<rect x="'+FX(rx+1.2)+'" y="'+FY(ry+3.4)+'" width="1.3" height="3.6" fill="#181622"/>'
      +'<polygon points="'+P([rx-2,ry+4.8])+' '+P([rx+8,ry+5.6])+' '+P([rx+8,ry+4.2])+' '+P([rx-2,ry+3.4])+'" fill="#181622"/>';
    else s+='<polygon points="'+P([rx-2,ry+1.8])+' '+P([rx+6.5,ry+2.4])+' '+P([rx+6.5,ry+1.1])+' '+P([rx-2,ry+.4])+'" fill="#181622"/>';
  }
  s+='<rect x="'+FX(-.5)+'" y="'+FY(S.gy-.2)+'" width="2.6" height="1.2" rx=".5" fill="#6a6772"/>';
  return s+'</svg>';
}

function carMatches(c,w){
  const d=CARS[c.ci];
  if(w.any)return true;
  if(w.body)return w.body.includes(d.body);
  if(w.mk)return w.mk.includes(d.mk);
  if(w.dec==="old")return d.y[1]<1988;
  if(w.rar!=null)return d.rar>=w.rar;
  return true;
}

let AC=null,MUTE=false;try{MUTE=localStorage.getItem("cm_mute")==="1"}catch(e){}
function beep(f,t0,dur,type,vol,slide){const o=AC.createOscillator(),g=AC.createGain();o.type=type||"square";
  o.frequency.setValueAtTime(f,AC.currentTime+t0);
  if(slide)o.frequency.exponentialRampToValueAtTime(slide,AC.currentTime+t0+dur);
  g.gain.setValueAtTime(0,AC.currentTime+t0);g.gain.linearRampToValueAtTime(vol||.1,AC.currentTime+t0+.012);
  g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+t0+dur);
  o.connect(g).connect(AC.destination);o.start(AC.currentTime+t0);o.stop(AC.currentTime+t0+dur+.03)}
function sfx(n){if(MUTE)return;
  try{AC=AC||new(window.AudioContext||window.webkitAudioContext)();if(AC.state==="suspended")AC.resume();
  ({kaching:()=>{beep(1318,0,.09,"square",.09);beep(1760,.07,.24,"square",.09)},
    thud:()=>beep(95,0,.16,"square",.16,58),
    tick:()=>beep(2600,0,.03,"square",.04),
    level:()=>[523,659,784,1046].forEach((f,i)=>beep(f,i*.09,.13,"square",.08)),
    win:()=>[784,988,1175,1568,1976].forEach((f,i)=>beep(f,i*.07,.11,"square",.08)),
    bad:()=>beep(196,0,.28,"sawtooth",.11,110),
    scratch:()=>beep(900,0,.045,"sawtooth",.05),
    honk:()=>{beep(660,0,.11,"square",.12);beep(660,.16,.2,"square",.12)},
    modem:()=>{beep(350,0,.35,"sine",.06);beep(440,.1,.35,"sine",.06);beep(1300,.5,.3,"sine",.07);
      beep(2100,.82,.28,"sine",.06);beep(980,1.12,.25,"sawtooth",.05,2400);beep(1700,1.4,.6,"square",.03,3200)}})[n]()}catch(e){}}

function tweenCash(){

  const t0=performance.now(),dur=450;

    HCASH=Math.round(from+(to-from)*k);

    HTW=k<1?requestAnimationFrame(step):null};
  HTW=requestAnimationFrame(step);
}

const startBid=c=>Math.round(trueValue(c)*.4/1000)*1000;
function genLot(){const c=genCar(pick(["pl","pl","ua","nl"]));c.transit=false;return c}
function openAuction(){
  if(!G.unlocks.auction)return;
  if(G.week%4!==2){toast("De veiling in Luik is er om de 4 weken.");return}
  const wk=G.year*52+G.week;
  if(!G.auction||G.auction.wk!==wk)G.auction={wk,lots:[genLot(),genLot(),genLot()],gone:[]};
  let h='<b>🔨 Veiling in Luik.</b> <span class="small dim">TL-licht, koffieautomaat, mannen met mappen. Curatorverkopen en inbeslagnames — motorkappen blijven dicht.</span><hr>';
  G.auction.lots.forEach((c,i)=>{
    const gone=G.auction.gone.includes(i);
    h+='<div class="carline" '+(gone?'style="opacity:.4;cursor:default"':'onclick="bidLot('+i+')"')+'><div class="carpic" style="width:86px">'+carArt(c,88)+'</div><div style="flex:1"><b>'+esc(carName(c))+'</b> <span class="small dim">('+c.year+')</span>'
     +'<div class="small dim">'+c.km.toLocaleString().replace(/,/g,".")+' km · staat: ??? · papieren: ???</div></div>'
     +(gone?'<span class="pill">weg</span>':'<div class="money small">vanaf '+fmt(startBid(c))+'</div>')+'</div>';
  });
  save();
  modal(h,[{t:"Buiten",cls:"ghost",fn:closeModal}]);
}
function bidLot(i){
  const c=G.auction.lots[i];if(!c||G.auction.gone.includes(i))return;
  const s=startBid(c),v0=Math.round(s*1.5/1000)*1000;
  modal('<b>Lot '+(i+1)+': '+esc(carName(c))+' ('+c.year+')</b><div class="small dim">De afslager ratelt in twee talen. Bieden doe je blind — 🎲 puur gokwerk.</div>'
   +'<input type="range" class="slider" id="aucsl" min="'+s+'" max="'+(s*3)+'" value="'+v0+'" step="1000" oninput="updAuc()">'
   +'<div class="center"><b id="aucv" class="money">'+fmt(v0)+'</b></div>',
  [{t:"🔨 Bied",fn:()=>doAuc(i)},{t:"Terug",cls:"ghost",fn:openAuction}]);
}
function updAuc(){$("aucv").textContent=fmt(+$("aucsl").value)}
function doAuc(i){
  const c=G.auction.lots[i],bid=+$("aucsl").value;
  if(G.cash-bid<creditLimit()){toast("Zoveel heb je niet op zak.");return}
  const rival=Math.round(trueValue(c)*rnd(.45,.95)/1000)*1000;
  const win=bid>rival;
  G.auction.gone.push(i);
  suspense(["🔨","👥","🚬","📋"],"'Eenmaal... andermaal...'",()=>{
    if(win){
      G.cash-=bid;G.spent+=bid;c.paid=bid;c.known=c.quirks.slice();if(c.rolled)c.known.push("__rolled");
      G.cars.push(c);
      stamp("AFGESLAGEN!","gold");sfx("kaching");addXP(12);
      log("Veiling Luik: "+carName(c)+" gekocht voor "+fmt(bid)+".");
      modal("<b>🔨 Verkocht aan de meneer uit Essene!</b> En nu mag de motorkap eindelijk open...<hr>"+mkCarSheet(c,true),
       [{t:"Naar de garage",fn:closeModal},{t:"Terug naar de veiling",cls:"ghost",fn:openAuction}]);
    }else{
      modal("Een gast met een sigaar en een gsm zo groot als een baksteen biedt <b>"+fmt(rival)+"</b>. Het lot is weg.",
       [{t:"Volgende",fn:openAuction}]);

}

let KR=null;
function scratchLot(){
  if(!(G.kras>0)){toast("Geen krasloten.");return}
  G.kras--;save();
  const SYM=["💰","💎","🍀","🚗","🚬"];
  let cells;const r=Math.random();
  if(r<.02)cells=["💎","💎","💎"];
  else if(r<.12)cells=["💰","💰","💰"];
  else if(r<.25)cells=["🍀","🍀","🍀"];
  else{do{cells=[pick(SYM),pick(SYM),pick(SYM)]}while(cells[0]===cells[1]&&cells[1]===cells[2])}
  KR={cells,open:0};
  modal('<b>🎫 Kraslot "Rap Rijk".</b> Kras de drie vakjes met je duimnagel.'
   +'<div class="center" style="margin-top:10px">'+[0,1,2].map(i=>'<span class="scr" id="scr'+i+'" onclick="scratch('+i+')">?</span>').join("")+'</div>'
   +'<div class="center small dim">3 dezelfde = prijs · 💎 50.000 · 💰 10.000 · 🍀 +3 rep</div>',
  [{t:"Weg ermee",cls:"ghost",fn:()=>{KR=null;closeModal()}}]);
}
function scratch(i){
  if(!KR)return;
  const el=$("scr"+i);if(!el||el.classList.contains("open"))return;
  el.classList.add("open");el.textContent=KR.cells[i];sfx("scratch");KR.open++;
  if(KR.open===3){
    const w=KR.cells[0]===KR.cells[1]&&KR.cells[1]===KR.cells[2]?KR.cells[0]:null;KR=null;
    setTimeout(()=>{
      if(w==="💎"){G.cash+=50000;stamp("50.000 GEKRAST!","gold");confetti(70);sfx("win");popNum("+"+fmt(50000),"pgreen");log("Kraslot: 50.000 BEF! De frituur trakteert vanavond.")}
      else if(w==="💰"){G.cash+=10000;stamp("PRIJS!","gold");sfx("kaching");popNum("+"+fmt(10000),"pgreen")}
      else if(w==="🍀"){repAdd(3);stamp("+3 REP","pink");popNum("+3 ★","pamber")}
      else toast("Niks. Het zilverstof blijft aan je duim plakken.");
      save();hdr()},450);
  }
}

const WCOLS=["#52417a","#3c2f58","#5d3a78","#463763","#33274b","#54254a","#443a60"];
function spinWheel(){
  if(G.spun){toast("Al gedraaid deze week.");return}
  let tot=WHEEL.reduce((s,w)=>s+w.w,0),r=Math.random()*tot,si=0;
  for(let i=0;i<WHEEL.length;i++){r-=WHEEL[i].w;if(r<=0){si=i;break}}
  const seg=WHEEL[si];
  const land=()=>{
    if(WIV){clearInterval(WIV);WIV=null}
    G.spun=true;seg.fn();addXP(3);save();hdr();
    modal('<div class="center" style="padding:10px 0"><div class="reel">'+seg.e+'</div><b>'+seg.t+'</b></div>',
     [{t:"OK",fn:closeModal}]);
  };
  if(!REEL_MS){land();return}
  const n=WHEEL.length,sa=360/n;
  const slices=WHEEL.map((w,i)=>WCOLS[i%WCOLS.length]+" "+(i*sa)+"deg "+((i+1)*sa)+"deg").join(",");
  const ems=WHEEL.map((w,i)=>{const a=i*sa+sa/2;
    return '<span class="wseg" style="transform:rotate('+a+'deg) translateY(-70px) rotate('+(-a)+'deg)">'+w.e+'</span>'}).join("");
  modal('<div class="center"><b>🎡 Rad van Koudenberg</b>'
   +'<div class="wheelwrap"><div class="wheelptr">▼</div>'
   +'<div class="wheel" id="wheelEl" style="background:conic-gradient('+slices+')">'+ems+'<div class="wheelhub"></div></div></div>'
   +'<div class="small dim">Het rad ratelt aan de bushalte...</div></div>',[]);
  const target=5*360+(360-(si*sa+sa/2));
  requestAnimationFrame(()=>requestAnimationFrame(()=>{const el=$("wheelEl");
    if(el){el.style.transition="transform 2.8s cubic-bezier(.12,.75,.2,1)";el.style.transform="rotate("+target+"deg)"}}));
  WIV=setInterval(()=>sfx("tick"),110);
  setTimeout(land,3050);
}

function hagBonus(){return (HAG&&HAG.talk&&HAG.talk.bonus)||0}

  let t=.80+HAG.tries*.06;
  if(isCh("alan"))t-=.09; if(isCh("thomas"))t-=.06; if(G.rb){t-=.05}
  return clamp((bid/c.ask-t)/(1-t)+hagBonus(),.03,.97);
}

function doRespray(id,col){
  const c=getCar(id);if(!c)return;

  if(G.cash-RESPRAY_COST<creditLimit()){toast("Te weinig geld.");return}
  G.cash-=RESPRAY_COST;c.col=col;save();
  log(carName(c)+" overgespoten in "+COLORS[col].n+" ("+fmt(RESPRAY_COST)+").");
  suspense(["🌈","🖌️","🎨","✨"],"Afplakken, spuiten, drogen...",()=>{
    popNum("-"+fmt(RESPRAY_COST),"pred");addXP(4);stamp("VERS GESPOTEN","pink");
    toast("🌈 De "+carName(c)+" glanst nu in "+COLORS[col].n+".");
    SWEEP=c.id;openCar(id);hdr()},fixScene(c,"spray",COLORS[col].h));
}

   +'<div class="center"><b id="kmv">'+Math.round(c.km*.6/1000)*1000+' km</b></div>'

function renderSell(){
  let h='<h2>🤝 Verkoop</h2>'
   +'<div class="row" style="margin-bottom:8px"><span class="pill warn">📈 Trend: '+BODN[G.trendBody]+' (+12%)</span>'
   +((G.combo||0)>=2?'<span class="pill good">🔥 Verkoopstreak ×'+G.combo+'</span>':'')
   +(G.bet?'<span class="pill info">🤠 Weddenschap: verkoop '+(2-(G.wkSold||0)>0?("nog "+(2-(G.wkSold||0))):"✓ binnen")+'</span>':'')+'</div>';
  if(G.custs.length===0)h+='<div class="card center dim">Geen klanten deze week. Sluit de week af of werk aan je reputatie.</div>';
  for(const cu of G.custs){
    h+='<div class="card"><div class="spread"><h3 style="margin:0">'+(cu.face||"🙋")+' '+cu.name+(cu.vip?' <span class="pill warn">⭐ VIP</span>':'')+(cu.net?' <span class="pill info">🌐 via internet</span>':'')+'</h3>'
     +(isCh("thomas")?'<span class="pill info">budget ± '+fmt(cu.budget)+'</span>':'<span class="pill dim">budget: geheim</span>')+'</div>'
     +'<div class="small dim">'+cu.t+'</div>'
     +'<button class="btn primary" onclick="openCust('+cu.id+')" '+(G.cars.length?"":"disabled")+'>Toon wagens</button></div>';
  }
  h+='<p class="small dim">Elke week komen er nieuwe kandidaten langs'+(G.office===1?" (de showroom in Zellik trekt volk)":" (aan bushalte Koudenberg is de passage beperkt)")+'. Reputatie = meer en rijkere klanten.</p>';
  $("view").innerHTML=h;
}
let NEG=null;
function openCust(cid){
  const cu=G.custs.find(x=>x.id===cid);if(!cu)return;
  let h='<b>'+(cu.face||"🙋")+' '+cu.name+'</b> <span class="dim small">'+cu.t+'</span><hr>';
  for(const c of G.cars){
    const m=carMatches(c,cu.want);
    h+='<div class="carline" onclick="openNeg('+cid+','+c.id+')"><div class="carpic" style="width:86px">'+carArt(c,88)+'</div><div style="flex:1"><b>'+esc(carName(c))+'</b> <span class="small dim">('+c.year+')</span>'
     +'<div class="small">'+(m?'<span class="pill good">past bij de vraag</span>':'<span class="pill">niet echt wat die zoekt</span>')+'</div></div>'
     +'<div class="money small">'+fmt(askValue(c))+'</div></div>';
  }
  modal(h,[{t:"Sluiten",cls:"ghost",fn:closeModal}]);
}
function hiddenIssues(c){
  const list=[];
  if(c.rolled)list.push({id:"__rolled",t:"teller is teruggedraaid",pen:.15});
  if(c.eng<45)list.push({id:"__eng",t:"motor is eigenlijk versleten",pen:.12});
  for(const q of c.quirks){const Q=QUIRKS.find(x=>x.id===q);
    if(Q&&Q.hide)list.push({id:q,t:Q.t,pen:-Q.v});}
  if(c.papers===2||c.hot)list.push({id:"__pap",t:"papieren zijn... creatief",pen:.2});
  return list;
}

const TAGICON={charm:"😏",shady:"🚬",zakelijk:"💼"};
function talkRoll(mv){
  let p=mv.p+Math.min(.08,((G.lvl||1)-1)*.006);
  if((mv.g==="charm"&&isCh("thomas"))||(mv.g==="shady"&&isCh("alan"))||(mv.g==="zakelijk"&&isCh("martine")))p+=.15;
  const r=Math.random();
  return r<p?1:r<p+.18?0:-1;
}
function pickTalks(ctx,n){
  const pool=TALK[ctx],ix=[];
  let guard=0;
  while(ix.length<n&&ix.length<pool.length&&guard++<100){const i=Math.floor(Math.random()*pool.length);if(!ix.includes(i))ix.push(i)}
  for(let i=0;ix.length<Math.min(n,pool.length)&&i<pool.length;i++)if(!ix.includes(i))ix.push(i);
  return ix;
}

   +'<div class="actor right"><div class="dface">'+op.face+'</div><div class="small dim">'+esc(op.name)+'</div></div></div>';

function talkButtons(ctx,st,fnName){
  if(st.left<=0)return '<div class="small dim">🗨️ Uitgepraat — nu de cijfers.</div>';
  return '<div class="small dim">🗨️ Zeg eens iets ('+st.left+' kans'+(st.left>1?"en":"")+'):</div>'
   +st.choices.map((mi,k)=>{const mv=TALK[ctx][mi];
     return '<button class="btn choicebtn" onclick="'+fnName+'('+k+')">'+(TAGICON[mv.g]?TAGICON[mv.g]+" ":"")+'“'+mv.t+'”</button>'}).join("");
}
function applyTalk(ctx,st,k){
  const mv=TALK[ctx][st.choices[k]];
  const out=talkRoll(mv);
  st.lastYou=mv.t;st.left--;
  if(out===1){st.bonus=clamp(st.bonus+mv.e,-.25,.25);st.lastThem=pick(mv.ok);
    if(mv.h){heatAdd(mv.h);popNum("+"+mv.h+" 🔥","pred")}
    popNum("+"+Math.round(mv.e*100)+"% 🎲","pgreen");sfx("kaching");}
  else if(out===-1){st.bonus=clamp(st.bonus-mv.e*.8,-.25,.25);st.lastThem=pick(mv.no);
    popNum("-"+Math.round(mv.e*80)+"% 🎲","pred");sfx("bad");}
  else{st.lastThem=pick(TALK.neutral);}
  st.choices=pickTalks(ctx,3);
  return out;
}

let TD=null,ENGO=null,ENGG=null;
function engineStart(){if(MUTE)return;
  try{AC=AC||new(window.AudioContext||window.webkitAudioContext)();if(AC.state==="suspended")AC.resume();
  ENGO=AC.createOscillator();ENGG=AC.createGain();ENGO.type="sawtooth";
  ENGG.gain.value=.03;ENGO.frequency.value=55;ENGO.connect(ENGG).connect(AC.destination);ENGO.start()}catch(e){}}
function engineSet(sp){try{if(ENGO)ENGO.frequency.setTargetAtTime(52+sp*.95,AC.currentTime,.05)}catch(e){}}
function engineStop(){try{if(ENGO){ENGO.stop();ENGO=null}}catch(e){}}
const BODY_TOP={hatch:165,sedan:182,wagon:172,coupe:196,cabrio:186,sport:238,van:128,suv:142};
function topSpeed(c){const d=CARS[c.ci];
  let v=(BODY_TOP[d.body]||170)*(0.62+0.38*Math.min(1,Math.sqrt(d.base/500000)));
  v*=(0.72+0.28*(c.eng==null?80:c.eng)/100);
  v*=1+0.07*(c.tuned||0);
  return Math.round(v);}
function tdKD(e){if(!TD)return;if(e.key==="ArrowLeft"||e.key==="a")TD.dir=-1;if(e.key==="ArrowRight"||e.key==="d")TD.dir=1}
function tdKU(e){if(!TD)return;if(["ArrowLeft","ArrowRight","a","d"].includes(e.key))TD.dir=0}
function tdCleanup(){if(!TD)return;TD.on=false;
  if(TD.raf)cancelAnimationFrame(TD.raf);
  window.removeEventListener("keydown",tdKD);window.removeEventListener("keyup",tdKU);
  engineStop();}
function tdReveal(q,txt){const c=TD.c;
  if(q&&c.known.includes(q))return;
  if(q)c.known.push(q);
  TD.reveals.push(txt);toast("👀 "+txt);sfx("bad");popNum("🔍","pamber");}

function tdLoop(ts){
  if(!TD||!TD.on)return;
  const dt=Math.min(.05,TD.lt?(ts-TD.lt)/1000:.016);TD.lt=ts;
  tdTick(dt);if(TD&&TD.on)tdDraw();
  if(TD&&TD.on)TD.raf=requestAnimationFrame(tdLoop);
}
function tdTick(dt){
  const c=TD.c,eng=(c.eng==null?80:c.eng),body=(c.body==null?80:c.body);
  TD.t+=dt;
  // speed: acceleration scales with engine condition
  const accel=34*(0.45+0.55*eng/100);
  TD.speed=Math.min(TD.maxV,TD.speed+accel*dt);
  // engine sputter on a worn motor
  if(eng<50){TD.sputT-=dt;
    if(TD.sputT<=0){TD.sputT=2.5+Math.random()*3;TD.speed*=.62;sfx("bad");
      if(!TD.sput){TD.sput=true;toast("💨 De motor sputtert en vangt zich weer. Hmm.")}}}
  // gearbox crunch when 'shifting' past 90
  if(TD.gearArm&&TD.speed>90){TD.gearArm=false;TD.speed-=14;
    tdReveal("gearbox","KRRRK bij het schakelen — de versnellingsbak kraakt in z'n 3e.")}
  if(TD.t>TD.electrAt){TD.electrAt=1e9;const el=$("tdwrap");if(el){el.classList.remove("tdflick");void el.offsetWidth;el.classList.add("tdflick")}
    tdReveal("electr","Het dashboard flikkert even helemaal weg. Elektriek doet raar.")}
  if(TD.t>TD.floodAt){TD.floodAt=1e9;tdReveal("flood","Er klotst iets achter de deurbekleding. Waterschade, gegarandeerd.")}
  if(TD.t>TD.taxiAt){TD.taxiAt=1e9;tdReveal("taxi","De bestuurderszetel zit door tot op de veren. Ex-taxi, dit.")}
  // steering: body condition = tightness; crash quirk = constant pull
  const steer=(1.15+0.5*body/100)*(0.4+0.6*Math.min(1,TD.speed/80));
  TD.x+=TD.dir*steer*dt;
  TD.x+=Math.sin(TD.t*11)*dt*(1-body/100)*.9;
  if(TD.pull){TD.x+=TD.pull*dt;
    if(TD.t>TD.pullAt&&!c.known.includes("crash")){TD.pullAt=1e9;tdReveal("crash","Hij trekt vanzelf naar rechts. Chassis niet meer recht — overgespoten na een klapper.")}}
  // curves push you out
  TD.curveT-=dt;
  if(TD.curveT<=0){TD.curveT=4+Math.random()*3;TD.curveTarget=(Math.random()*1.8-0.9)}
  TD.curve+=(TD.curveTarget-TD.curve)*dt*.7;
  TD.x-=TD.curve*dt*(TD.speed/240)*1.4;
  // off-road rumble
  if(Math.abs(TD.x)>1.05){TD.speed=Math.max(40,TD.speed-90*dt);TD.x=clamp(TD.x,-1.35,1.35)}
  // traffic
  TD.spawnT-=dt;
  if(TD.spawnT<=0){TD.spawnT=1.15+Math.random()*1.1;
    TD.obs.push({z:260,lane:pick([-0.55,0,0.55]),e:pick(["🚗","🚙","🚚","🚜","🚌"]),v:55+Math.random()*30})}
  TD.hitCd=Math.max(0,TD.hitCd-dt);
  for(const o of TD.obs){o.z-=(TD.speed-o.v)*dt*.62;
    if(o.z<16&&o.z>2&&TD.hitCd<=0&&Math.abs(o.lane-TD.x*.8)<.34){
      o.z=-99;TD.hits++;TD.hitCd=1;TD.speed*=.4;ouch();popNum("💥","pred");
      if(TD.mode==="market"&&TD.hits>=3){toast("De verkoper wordt lijkbleek en wuift je naar de kant.");tdEnd(true);return}}}
  TD.obs=TD.obs.filter(o=>o.z>0&&o.z<300);
  TD.pos+=TD.speed*dt*.6;
  TD.dist+=TD.speed*dt/3600;
  TD.top=Math.max(TD.top,TD.speed);
  engineSet(TD.speed);
  const s=$("tdspd"),ti=$("tdtime"),di=$("tddist");
  if(s)s.textContent=Math.round(TD.speed);
  if(ti)ti.textContent=Math.max(0,Math.ceil(TD.dur-TD.t));
  if(di)di.textContent=TD.dist.toFixed(1);
  const carEl=$("tdcar");
  if(carEl)carEl.style.transform="translateX(calc(-50% + "+(TD.x*TD.w*.3)+"px)) rotate("+(TD.dir*3+TD.curve*-2)+"deg)";
  if(TD.t>=TD.dur)tdEnd(false);
}
function tdDraw(){
  const cv=$("tdc");if(!cv)return;
  const x=cv.getContext("2d"),W=TD.w,H=TD.h,hor=H*.4;
  const sky=x.createLinearGradient(0,0,0,hor);
  sky.addColorStop(0,"#181040");sky.addColorStop(.7,"#5d3a78");sky.addColorStop(1,"#a04e6e");
  x.fillStyle=sky;x.fillRect(0,0,W,hor);
  x.fillStyle="#ffb347";x.beginPath();x.arc(W*.68,hor*.72,16,0,7);x.fill();
  x.fillStyle="#241a37";x.beginPath();x.moveTo(0,hor);
  for(let i=0;i<=8;i++)x.lineTo(i*W/8,hor-8-Math.abs(Math.sin(i*2.1+1))*14);
  x.lineTo(W,hor);x.fill();
  const bend=t=>W/2+TD.curve*(1-t)*(1-t)*W*.5;
  const half=t=>10+t*t*W*.46;
  for(let y=Math.round(hor);y<H;y+=2){
    const t=(y-hor)/(H-hor);
    const wz=TD.pos+(1-t)*260/(t+.14);
    const st=Math.floor(wz/26)%2;
    x.fillStyle=st?"#2c2444":"#332a4e";x.fillRect(0,y,W,2);
    const cx=bend(t),hw=half(t);
    x.fillStyle=st?"#3a3350":"#413a58";x.fillRect(cx-hw,y,hw*2,2);
    x.fillStyle=st?"#d5001c":"#e8e6df";
    x.fillRect(cx-hw-4*t-2,y,4*t+2,2);x.fillRect(cx+hw,y,4*t+2,2);
    if(st){x.fillStyle="#e8d98a";x.fillRect(cx-2*t,y,4*t,2)}
  }
  x.textAlign="center";
  for(const o of TD.obs){
    if(o.z<=0||o.z>=260)continue;
    const t=1-o.z/260;if(t<=0.02)continue;
    const y=hor+t*(H-hor),size=6+t*40;
    const cx=bend(t),hw=half(t);
    x.font=size+"px serif";
    x.fillText(o.e,cx+o.lane*hw,y);
  }
}

  const warm=new THREE.PointLight(0xffb347,.4,22);warm.position.set(5,2,-3);sc.add(warm);
  const grp=new THREE.Group();
  const disc=new THREE.Mesh(new THREE.CylinderGeometry(L*.72,L*.78,.14,48),
    new THREE.MeshPhongMaterial({color:0x3c3057,shininess:30}));
  disc.position.y=-.07;grp.add(disc);
  const ring=new THREE.Mesh(new THREE.TorusGeometry(L*.72,.025,8,64),
    new THREE.MeshPhongMaterial({color:0xffb347,emissive:0x6b4310}));
  ring.rotation.x=Math.PI/2;ring.position.y=.012;grp.add(ring);
  buildCar(grp,c);
  sc.add(grp);
  R3={ren,sc,cam,grp,af:0};
  const anim=()=>{grp.rotation.y+=.011;ren.render(sc,cam);R3.af=requestAnimationFrame(anim)};
  anim();
}
function buildCar(grp,c){
  const sp=SPECS[c.ci],S=SHAPES[sp.s],hex=COLORS[c.col].h;
  const k=sp.len/100,X=x=>(x-50)*k,Y=y=>y*k,Wd=S.wid||1.7;
  const paint=new THREE.MeshPhongMaterial({color:new THREE.Color(hex),shininess:80,specular:0x666677});
  const glass=new THREE.MeshPhongMaterial({color:0x49688a,shininess:110,specular:0xaabbcc});
  const dark=new THREE.MeshPhongMaterial({color:0x16141d,shininess:20});
  // body: the same real side profile as the 2D sprite, with wheel arches cut out
  const b=S.b.flatMap(p=>p[2]?[p,p]:[p]),mid=(a,q)=>[(a[0]+q[0])/2,(a[1]+q[1])/2];
  const sh=new THREE.Shape();
  sh.moveTo(X(b[0][0]),Y(b[0][1]));
  for(let i=1;i<b.length-1;i++){const m=mid(b[i],b[i+1]);sh.quadraticCurveTo(X(b[i][0]),Y(b[i][1]),X(m[0]),Y(m[1]))}
  sh.lineTo(X(b[b.length-1][0]),Y(b[b.length-1][1]));
  const R=S.wr+1.7,a0=Math.asin((S.gy-S.wr)/R);
  const arch=cx=>{sh.lineTo(X(cx+R*Math.cos(a0)),Y(S.gy));
    sh.absarc(X(cx),Y(S.wr),R*k,a0,Math.PI-a0,false);
    sh.lineTo(X(cx-R*Math.cos(a0)),Y(S.gy))};
  arch(S.fw);arch(S.rw);
  sh.lineTo(X(b[0][0]),Y(b[0][1]));
  const geo=new THREE.ExtrudeGeometry(sh,{depth:Wd,bevelEnabled:true,bevelThickness:.045,bevelSize:.045,bevelSegments:2,curveSegments:10});
  geo.translate(0,0,-Wd/2);
  grp.add(new THREE.Mesh(geo,paint));
  // glass, slightly wider than the body so it reads from every angle
  for(const wp of S.win){
    const ws=new THREE.Shape();
    ws.moveTo(X(wp[0][0]),Y(wp[0][1]));
    for(let i=1;i<wp.length;i++)ws.lineTo(X(wp[i][0]),Y(wp[i][1]));
    const g=new THREE.ExtrudeGeometry(ws,{depth:Wd+.16,bevelEnabled:false});
    g.translate(0,0,-(Wd+.16)/2);
    grp.add(new THREE.Mesh(g,glass));
  }
  // wheels
  const wm=new THREE.MeshPhongMaterial({color:0x141219,shininess:12});
  const hub=new THREE.MeshPhongMaterial({color:0xc9c8d3,shininess:70});
  [[S.fw,1],[S.fw,-1],[S.rw,1],[S.rw,-1]].forEach(q=>{
    const z=q[1]*(Wd/2-.09);
    const t=new THREE.Mesh(new THREE.CylinderGeometry(S.wr*k,S.wr*k,.22,20),wm);
    t.rotation.x=Math.PI/2;t.position.set(X(q[0]),Y(S.wr),z);grp.add(t);
    const hb=new THREE.Mesh(new THREE.CylinderGeometry(S.wr*k*.52,S.wr*k*.52,.24,14),hub);
    hb.rotation.x=Math.PI/2;hb.position.set(X(q[0]),Y(S.wr),z+q[1]*.005);grp.add(hb);
  });
  // lights
  const hlm=new THREE.MeshPhongMaterial({color:0xffe9b0,emissive:0x8a7433});
  const tlm=new THREE.MeshPhongMaterial({color:0xd93840,emissive:0x661116});
  const lamps=(x,y,mat)=>{[1,-1].forEach(sgn=>{
    const m=new THREE.Mesh(new THREE.BoxGeometry(.1,.16,Wd*.22),mat);
    m.position.set(X(x),Y(y),sgn*(Wd/2-Wd*.16));grp.add(m)})};
  if(sp.hl!=="pop")lamps(S.hl[0]+1.5,S.hl[1],hlm);
  lamps(S.tl[0]-.8,S.tl[1],tlm);
  // spoiler
  const wing=sp.w||((c.tuned||0)>1?1:0);
  if(wing){const[rx,ry]=S.rd;
    const bl=new THREE.Mesh(new THREE.BoxGeometry(k*9,k*1.4,Wd*.86),dark);
    bl.position.set(X(rx+3),Y(ry+(wing===2?4.5:1.2)),0);grp.add(bl);
    if(wing===2)[1,-1].forEach(sgn=>{
      const st=new THREE.Mesh(new THREE.BoxGeometry(k*1.2,k*3.4,.05),dark);
      st.position.set(X(rx+3),Y(ry+2.2),sgn*Wd*.3);grp.add(st)});
  }
}

const _renderTabs={office:renderOffice,travel:()=>MK?renderMarket():renderTravel(),garage:renderGarage,sell:renderSell,plates:renderPlates};
function renderBody(){(_renderTabs[CUR]||renderOffice)()}
// override render to use dispatch with market state
render=function(){
  if(!G)return;
  checkGoals();
  if(G.pendingGala&&!modalOpen()){G.pendingGala=0;showAwards()}
  hdr();
  const nb=$("nav");nb.style.display="flex";
  $("tabsbar").innerHTML=TABS.map(t=>'<button class="'+(CUR===t[0]?"on":"")+'" onclick="nav(\''+t[0]+'\')"><span class="ic">'+t[1]+'</span>'+t[2]+(t[0]==="sell"&&G.custs.length?" ("+G.custs.length+")":"")+'</button>').join("");
  if(G.over){renderOver();return}
  renderBody();
  save();
};
window.addEventListener("load",renderStart);
