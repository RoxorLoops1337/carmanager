<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#191223">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>CarManager · Essene 1995</title>
<meta property="og:title" content="CarManager · Essene 1995">
<meta property="og:description" content="Tweedehands wagens, verse papieren en veel Red Bull. Een louche autohandel-game, gratis in je browser.">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#120d1d; --bg2:#1c1430; --card:#281e3c; --card2:#33274b;
  --edge:#4a3c66; --edge2:#655388; --txt:#f3ecdf; --dim:#a89dc2;
  --amber:#ffb347; --pink:#ff5d9e; --green:#72e08e; --red:#ff6b5e; --blue:#6cc4ff;
  --shadow:0 6px 20px rgba(0,0,0,.5);
  --hfont:"Barlow Condensed","Trebuchet MS",sans-serif;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
  font-family:"Trebuchet MS",Verdana,system-ui,sans-serif;font-size:15px;
  min-height:100%; overscroll-behavior:none}
body{background:
  radial-gradient(1200px 520px at 75% -12%, #34224f 0%, transparent 60%),
  radial-gradient(900px 480px at -5% 108%, #2b1837 0%, transparent 55%),
  linear-gradient(180deg,#171126 0%, #120d1d 100%)}
#hdr{position:sticky;top:0;z-index:30;display:none;gap:7px;align-items:center;
  padding:8px 12px;background:rgba(17,11,27,.9);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--edge);font-size:13px;flex-wrap:wrap}
#hdr .stat{display:flex;align-items:center;gap:5px;
  background:linear-gradient(180deg,#352852,#281e3c);
  border:1px solid var(--edge);border-radius:20px;padding:4px 11px;white-space:nowrap;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06)}
#hdr .cash{color:var(--green);font-weight:bold}
#hdr .heatv{color:var(--red)} #hdr .repv{color:var(--amber)}
#view{max-width:760px;margin:0 auto;padding:14px 12px 88px}
#nav{position:fixed;bottom:0;left:0;right:0;z-index:30;display:none;
  background:rgba(17,11,27,.94);backdrop-filter:blur(10px);
  border-top:1px solid var(--edge);justify-content:center}
#nav .tabs{display:flex;width:100%;max-width:760px}
#nav button{flex:1;background:none;border:none;color:var(--dim);padding:10px 2px 12px;
  font-family:inherit;font-size:11px;cursor:pointer;display:flex;flex-direction:column;
  align-items:center;gap:3px;position:relative}
#nav button .ic{font-size:20px;line-height:1;transition:transform .12s}
#nav button.on{color:var(--amber)}
#nav button.on .ic{transform:translateY(-1px) scale(1.12)}
#nav button.on::before{content:"";position:absolute;top:0;left:22%;right:22%;height:3px;
  border-radius:0 0 4px 4px;background:var(--amber);box-shadow:0 0 10px var(--amber)}
h1,h2,h3{margin:.2em 0 .4em;letter-spacing:.5px}
h2{font-family:var(--hfont);font-weight:600;font-size:25px;letter-spacing:1.4px;
  color:var(--amber);text-transform:uppercase;text-shadow:0 2px 8px rgba(255,179,71,.18)}
h3{font-family:var(--hfont);font-weight:600;font-size:18px;letter-spacing:.8px}
.card{background:linear-gradient(165deg,#2e2344 0%,#271d3b 55%,#241a37 100%);
  border:1px solid var(--edge);border-radius:16px;
  padding:14px;margin-bottom:12px;
  box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.05)}
.card.flat{box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}
.btn{display:inline-block;background:linear-gradient(180deg,#524174,#3c2f58);
  color:var(--txt);border:1px solid var(--edge2);border-top-color:#7a689f;border-radius:12px;
  padding:10px 15px;font-family:inherit;font-size:14px;font-weight:bold;cursor:pointer;
  margin:3px 4px 3px 0;text-align:center;
  box-shadow:0 3px 8px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.08)}
.btn:active{transform:translateY(1px);box-shadow:0 1px 3px rgba(0,0,0,.35)}
.btn.primary{background:linear-gradient(180deg,#ffd07d,#ea9c2b);color:#33200a;
  border-color:#c47f1d;border-top-color:#ffe4b0;text-shadow:0 1px 0 rgba(255,255,255,.28)}
.btn.shady{background:linear-gradient(180deg,#7d3d6d,#54254a);border-color:#94517f;
  border-top-color:#aa6896;color:#ffd9ec}
.btn.danger{background:linear-gradient(180deg,#b04a45,#83302c);border-color:#c25c5c;border-top-color:#d18884}
.btn.ghost{background:rgba(255,255,255,.02);border:1px dashed var(--edge);color:var(--dim);box-shadow:none}
.btn:disabled{opacity:.4;pointer-events:none}
.btn.block{display:block;width:100%}
.pill{display:inline-block;font-size:11px;border-radius:20px;padding:2.5px 9px;margin:1.5px 3px 1.5px 0;
  background:rgba(255,255,255,.045);border:1px solid var(--edge);color:var(--dim)}
.pill.good{color:var(--green);border-color:#3f7a4e;background:rgba(114,224,142,.07)}
.pill.bad{color:var(--red);border-color:#8a4642;background:rgba(255,107,94,.07)}
.pill.warn{color:var(--amber);border-color:#8a6d34;background:rgba(255,179,71,.07)}
.pill.info{color:var(--blue);border-color:#3f6a8d;background:rgba(108,196,255,.07)}
.money{color:var(--green);font-weight:bold}
.neg{color:var(--red);font-weight:bold}
.dim{color:var(--dim)} .small{font-size:12px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.row>*,.spread>*,.carline>*{min-width:0;overflow-wrap:break-word}
.spread{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.evbox{overflow-wrap:break-word}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:520px){.grid2{grid-template-columns:1fr}}
.bar{height:8px;border-radius:6px;background:#191225;overflow:hidden;border:1px solid var(--edge)}
.bar i{display:block;height:100%;border-radius:6px}
.swatch{display:inline-block;width:13px;height:13px;border-radius:4px;border:1px solid rgba(255,255,255,.35);vertical-align:-2px;margin-right:4px}
.carline{display:flex;gap:12px;align-items:center;padding:10px 12px;border:1px solid var(--edge);
  border-radius:14px;margin-bottom:10px;cursor:pointer;
  background:linear-gradient(165deg,#352a50 0%,#2c2143 60%,#281e3c 100%);
  box-shadow:0 4px 12px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.05);
  transition:border-color .1s, transform .08s}
.carline:hover{border-color:var(--edge2)}
.carline:active{transform:scale(.99);background:#3b2f55}
.carline .em{font-size:26px}
.carpic{flex:0 0 auto;width:106px;display:flex;justify-content:center;align-items:flex-end}
.carpic svg{display:block;max-width:100%;filter:drop-shadow(0 3px 3px rgba(0,0,0,.45))}
.carpic.big{width:100%;margin:2px 0 4px}
.logline{padding:6px 2px;border-bottom:1px dashed #3a2f52;font-size:13px}
.logline:last-child{border-bottom:none}
#modal{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;
  background:rgba(8,5,15,.82);padding:14px;backdrop-filter:blur(3px)}
#modal .box{background:linear-gradient(170deg,#312547 0%,#281e3c 70%);border:1px solid var(--edge2);border-radius:18px;
  padding:18px;max-width:480px;width:100%;max-height:88vh;overflow-y:auto;
  box-shadow:0 14px 50px rgba(0,0,0,.65), inset 0 1px 0 rgba(255,255,255,.06)}
#toasts{position:fixed;top:54px;left:0;right:0;z-index:60;display:flex;flex-direction:column;
  align-items:center;gap:6px;pointer-events:none;padding:0 12px}
.toast{background:linear-gradient(180deg,#463763,#3a2e52);border:1px solid var(--amber);color:var(--txt);border-radius:12px;
  padding:9px 16px;font-size:13px;box-shadow:var(--shadow),0 0 14px rgba(255,179,71,.15);max-width:420px;animation:tpop .25s}
@keyframes tpop{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
.neon{font-family:"Bungee",var(--hfont);font-size:38px;font-weight:normal;letter-spacing:1px;text-align:center;
  color:#ffd9e8;text-shadow:0 0 6px #ff6fa5,0 0 22px #ff2f7e,0 0 46px #ff2f7e;
  animation:neonpulse 3.2s ease-in-out infinite}
@keyframes neonpulse{0%,100%{text-shadow:0 0 6px #ff6fa5,0 0 22px #ff2f7e,0 0 46px #ff2f7e}
  50%{text-shadow:0 0 4px #ff6fa5,0 0 14px #ff2f7e,0 0 30px #ff2f7e}}
.neon small{display:block;font-family:var(--hfont);font-size:14px;letter-spacing:7px;color:var(--amber);
  text-shadow:0 0 10px #ffb347;margin-top:4px}
.parade{display:flex;justify-content:center;gap:10px;align-items:flex-end;margin:14px 0 4px;flex-wrap:wrap}
.parade svg{filter:drop-shadow(0 4px 4px rgba(0,0,0,.5))}
.charcard{cursor:pointer;transition:transform .1s, border-color .1s}
.charcard:hover{border-color:var(--edge2)}
.charcard:active{transform:scale(.98)}
.charcard .face{font-size:46px;text-align:center;filter:drop-shadow(0 3px 6px rgba(0,0,0,.4))}
.slider{width:100%}
input[type=range]{accent-color:var(--amber)}
select,input[type=text]{background:var(--card2);color:var(--txt);border:1px solid var(--edge);
  border-radius:8px;padding:8px;font-family:inherit;font-size:14px}
.evbox{font-size:15px;line-height:1.45}
.center{text-align:center}
#c3dwrap{display:flex;justify-content:center;margin:8px 0}
#c3d{border-radius:14px;border:1px solid var(--edge2);
  background:linear-gradient(180deg,#2a1d42 0%,#170f24 70%,#0e0917 100%);
  box-shadow:inset 0 0 40px rgba(0,0,0,.5), 0 6px 20px rgba(0,0,0,.4)}
.plate{display:inline-block;background:#d5001c;color:#fff;font-weight:bold;border-radius:4px;
  padding:1px 7px;font-family:monospace;letter-spacing:1px;border:1px solid #fff}
.tablebtns{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.pop{position:fixed;z-index:70;transform:translate(-50%,-50%);font-weight:900;font-size:24px;
  font-family:var(--hfont);letter-spacing:1px;pointer-events:none;
  text-shadow:0 2px 8px rgba(0,0,0,.65);animation:popfly 1.1s ease-out forwards}
@keyframes popfly{0%{opacity:0;margin-top:12px;scale:.6}15%{opacity:1;scale:1.18}100%{opacity:0;margin-top:-85px;scale:1}}
.pgreen{color:var(--green)}.pred{color:var(--red)}.pamber{color:var(--amber)}.pblue{color:var(--blue)}
.stamp{position:fixed;z-index:80;left:50%;top:38%;transform:translate(-50%,-50%) rotate(-7deg);
  font-family:"Bungee",var(--hfont);font-size:min(11vw,44px);color:var(--amber);border:4px solid var(--amber);
  border-radius:14px;padding:6px 22px;background:rgba(18,13,29,.88);white-space:nowrap;
  text-shadow:0 0 18px rgba(255,179,71,.5);box-shadow:0 0 30px rgba(0,0,0,.6);
  pointer-events:none;animation:stampin 1.5s ease forwards}
.stamp.gold{color:#ffd76a;border-color:#ffd76a}
.stamp.pink{color:var(--pink);border-color:var(--pink);text-shadow:0 0 18px rgba(255,93,158,.5)}
.stamp.red{color:#ff6a5a;border-color:#ff6a5a;text-shadow:0 0 18px rgba(255,80,60,.55)}
@keyframes stampin{0%{opacity:0;transform:translate(-50%,-50%) rotate(-7deg) scale(2.4)}
  16%{opacity:1;transform:translate(-50%,-50%) rotate(-7deg) scale(1)}78%{opacity:1}100%{opacity:0}}
.reel{font-size:58px;line-height:1.25;filter:drop-shadow(0 4px 8px rgba(0,0,0,.5))}
.repline{opacity:0;animation:linein .4s ease forwards;padding:5px 2px;border-bottom:1px dashed #3a2f52}
.repline:last-child{border-bottom:none}
@keyframes linein{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:none}}
.grade{display:inline-block;font-family:"Bungee",var(--hfont);font-size:46px;border:3px solid;
  border-radius:12px;padding:2px 20px;margin:10px 0 2px;transform:rotate(-4deg)}
.oddsbar{height:9px;border-radius:6px;background:#191225;border:1px solid var(--edge);overflow:hidden;margin-top:4px}
.oddsbar i{display:block;height:100%;border-radius:6px;transition:width .15s}
.colpick{display:inline-block;width:34px;height:34px;border-radius:9px;margin:3px;cursor:pointer;
  border:2px solid rgba(255,255,255,.25);box-shadow:0 2px 6px rgba(0,0,0,.4), inset 0 2px 3px rgba(255,255,255,.25);
  transition:transform .08s}
.colpick:hover{transform:scale(1.12);border-color:#fff}
.colpick.cur{border:2px solid var(--amber);box-shadow:0 0 10px rgba(255,179,71,.5)}
.conf{position:fixed;z-index:75;width:8px;height:12px;border-radius:2px;pointer-events:none;opacity:0;
  animation:conffall 1.5s ease-in forwards}
@keyframes conffall{0%{opacity:1;transform:translate(0,0) rotate(0)}
  100%{opacity:0;transform:translate(var(--dx),var(--dy)) rotate(var(--rot))}}
.fw{position:fixed;z-index:76;width:6px;height:6px;border-radius:50%;pointer-events:none;opacity:0;
  box-shadow:0 0 6px 1px currentColor;animation:fwburst 1.4s ease-out forwards}
@keyframes fwburst{0%{opacity:0;transform:translate(0,0) scale(.4)}
  10%{opacity:1}70%{opacity:.9}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(1)}}
.coin{position:fixed;z-index:77;font-size:18px;pointer-events:none;opacity:0;will-change:transform;
  animation:coinfly 1.5s cubic-bezier(.2,.7,.4,1) forwards}
@keyframes coinfly{0%{opacity:0;transform:translate(0,0) rotateY(0) scale(.5)}
  12%{opacity:1;transform:translate(calc(var(--dx)*.4),calc(var(--dy)*.7)) rotateY(180deg) scale(1)}
  100%{opacity:0;transform:translate(var(--dx),calc(var(--dy) + 240px)) rotateY(900deg) scale(.9)}}
.shake{animation:shake .45s}
@keyframes shake{0%,100%{transform:none}20%{transform:translate(-7px,2px)}40%{transform:translate(6px,-3px)}
  60%{transform:translate(-5px,2px)}80%{transform:translate(4px,-1px)}}
.shake-lite{animation:shakelite .4s}
@keyframes shakelite{0%,100%{transform:none}25%{transform:translate(-3px,1px)}50%{transform:translate(3px,-1px)}75%{transform:translate(-2px,1px)}}
.polaroid{position:fixed;z-index:88;left:50%;top:38%;transform:translate(-50%,-50%);pointer-events:none;
  background:#f5f2ea;padding:8px 8px 4px;border-radius:3px;box-shadow:0 10px 30px rgba(0,0,0,.55);
  animation:develop 2.1s ease-out forwards}
.polaroid-pic{width:120px;height:80px;overflow:hidden;border-radius:2px;background:#20202a;display:flex;align-items:center;justify-content:center}
.polaroid-cap{font-family:var(--hfont);font-size:11px;color:#2a2620;text-align:center;padding:5px 2px 2px;line-height:1.15}
.polaroid-cap span{display:block;font-size:8px;color:#8a8478;letter-spacing:.5px}
@keyframes develop{0%{opacity:0;transform:translate(-50%,-30%) rotate(-8deg) scale(.7);filter:sepia(1) contrast(.6) brightness(1.5)}
  18%{opacity:1;transform:translate(-50%,-52%) rotate(3deg) scale(1.06);filter:sepia(.7) contrast(.8) brightness(1.2)}
  45%{transform:translate(-50%,-50%) rotate(-1deg) scale(1);filter:sepia(0) contrast(1) brightness(1)}
  82%{opacity:1;filter:none}100%{opacity:0;transform:translate(-50%,-64%) rotate(2deg) scale(.98);filter:none}}
.mood{font-size:24px;vertical-align:-3px}
.scr{display:inline-block;width:64px;height:64px;line-height:62px;font-size:34px;text-align:center;
  background:linear-gradient(180deg,#9da1ab,#6a6d75);border-radius:10px;margin:4px;cursor:pointer;
  border:2px solid #b8bac2;box-shadow:inset 0 2px 4px rgba(255,255,255,.4), 0 3px 8px rgba(0,0,0,.4);
  color:#4a4d55;font-weight:900;user-select:none}
.scr.open{background:#191225;border-color:var(--edge2);cursor:default;color:inherit}
.duel{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin:2px 0 6px}
.actor{text-align:center;flex:0 0 64px;width:64px;overflow:hidden}
.actor .small{white-space:normal;overflow-wrap:break-word;word-break:break-word;line-height:1.2;font-size:10.5px}
.dface{font-size:40px;line-height:1.15;filter:drop-shadow(0 3px 6px rgba(0,0,0,.45));animation:idlebob 2.8s ease-in-out infinite}
.actor.right .dface{animation-delay:1.4s}
@keyframes idlebob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.bubcol{flex:1 1 0;min-width:0}
.bub{position:relative;border-radius:12px;padding:7px 11px;font-size:13px;line-height:1.35;margin:4px 0;animation:bubin .2s ease;overflow-wrap:break-word}
.bub.you{background:rgba(76,120,255,.14);border:1px solid #4a5ea8;margin-right:7%}
.bub.them{background:rgba(255,93,158,.10);border:1px solid #7c4a63;margin-left:7%}
@keyframes bubin{from{opacity:0;transform:translateY(5px) scale(.95)}to{opacity:1;transform:none}}
.choicebtn{display:block;width:100%;text-align:left;margin:5px 0;font-weight:normal;font-size:13px}
.roadscene{position:relative;height:215px;border-radius:14px;overflow:hidden;margin:2px 0;
  background:linear-gradient(180deg,#181040 0%,#472a5e 38%,#a04e6e 52%,#221a38 52.5%)}
.rs-sun{position:absolute;left:64%;top:16%;width:38px;height:38px;border-radius:50%;
  background:radial-gradient(circle,#ffd76a,#ff8a5c 70%);box-shadow:0 0 26px #ff8a5c;opacity:.9}
.rs-trees{position:absolute;top:38%;left:0;white-space:nowrap;font-size:27px;animation:scrollx 7s linear infinite}
.rs-posts{position:absolute;top:60%;left:0;white-space:nowrap;font-size:15px;opacity:.8;animation:scrollx 2.6s linear infinite}
@keyframes scrollx{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.rs-road{position:absolute;left:0;right:0;bottom:0;height:36%;background:#241e33;border-top:3px solid #40385c}
.rs-dash{position:absolute;left:0;right:0;bottom:16%;height:5px;
  background:repeating-linear-gradient(90deg,#e8d98a 0 34px,transparent 34px 82px);animation:dashmove .45s linear infinite}
@keyframes dashmove{from{background-position:0 0}to{background-position:-82px 0}}
.rs-car{position:absolute;left:24%;bottom:8%;animation:carbob .4s ease-in-out infinite}
@keyframes carbob{0%,100%{transform:translateY(0) rotate(-.4deg)}50%{transform:translateY(-3px) rotate(.4deg)}}
.rs-txt{position:absolute;left:0;right:0;top:9px;text-align:center;color:#f3ecdf;font-size:13px;text-shadow:0 1px 5px #000}
.rs-puff{position:absolute;width:10px;height:10px;border-radius:50%;background:rgba(200,200,210,.4);
  animation:puff 1s ease-out infinite}
@keyframes puff{0%{opacity:.7;transform:translate(0,0) scale(.5)}100%{opacity:0;transform:translate(-26px,-14px) scale(1.6)}}
.roadscene.night{background:linear-gradient(180deg,#05040f 0%,#141030 45%,#1c1430 52%,#16121f 52.5%)}
.roadscene.night .rs-sun{background:radial-gradient(circle,#e8e6df,#9aa 70%);box-shadow:0 0 18px #ccd;width:26px;height:26px}
.rs-beam{position:absolute;bottom:14%;width:120px;height:26px;
  background:linear-gradient(90deg,rgba(255,240,180,.35),transparent 85%);
  clip-path:polygon(0 40%,100% 0,100% 100%,0 60%);pointer-events:none}
.rs-stars{position:absolute;top:6%;left:0;right:0;font-size:9px;letter-spacing:38px;opacity:.7}
/* living lot */
.lot{position:relative;height:158px;border-radius:14px;overflow:hidden;margin-bottom:12px;
  border:1px solid var(--edge);background:linear-gradient(180deg,#1d1640 0%,#3d2a58 52%,#33283f 52.5%,#3a3044 100%)}
.lot-sun{position:absolute;right:14%;top:12%;width:26px;height:26px;border-radius:50%;
  background:radial-gradient(circle,#ffd76a,#ff9a5c 75%);box-shadow:0 0 18px rgba(255,170,90,.7)}
.lot-clouds{position:absolute;top:8%;left:0;white-space:nowrap;font-size:16px;opacity:.55;letter-spacing:70px;animation:scrollx 60s linear infinite}
.lot-fence{position:absolute;left:0;right:0;top:37%;height:16%;
  background:repeating-linear-gradient(90deg,#4a3c66 0 3px,transparent 3px 14px);border-bottom:2px solid #4a3c66;opacity:.8}
.lot-office{position:absolute;left:6%;top:26%;width:78px;height:27%;background:linear-gradient(180deg,#5d5470,#453e57);
  border-radius:3px;border:1px solid #6a6180;box-shadow:0 3px 8px rgba(0,0,0,.4)}
.lot-office:before{content:"";position:absolute;left:8px;top:6px;width:22px;height:12px;background:#ffe9a8;border-radius:2px;
  box-shadow:34px 0 0 #ffd76a;animation:offlight 7s steps(1) infinite}
@keyframes offlight{0%,88%{opacity:1}89%,93%{opacity:.35}94%,100%{opacity:1}}
.lot-neon{position:absolute;left:6%;top:20%;font-family:"Bungee",var(--hfont);font-size:9px;letter-spacing:1px;
  cursor:pointer;z-index:4;color:#fff;--nh:#ff2f7e;text-shadow:0 0 4px var(--nh),0 0 9px var(--nh),0 0 15px var(--nh);
  animation:neonflik 3s ease-in-out infinite}

.lot-tag:before{content:"";position:absolute;top:-4px;left:50%;width:1px;height:4px;background:#9a8a55}

.lot-char{cursor:pointer}

function fairValue(c,shown,knowAll){
  const d=CARS[c.ci];
  const span=Math.max(1,d.y[1]-d.y[0]);
  const ageF=.75+.4*(c.year-d.y[0])/span;
  const expKm=(1997-c.year)*19000+15000;
  const km=shown?c.km:c.kmReal;
  const kmF=clamp(1.25-.45*(km/expKm),.5,1.3);
  const condF=.35+.75*((c.eng*.6+c.body*.4)/100);
  let qF=1+.07*(c.tuned||0);
  for(const q of c.quirks){const Q=QUIRKS.find(x=>x.id===q);
    if(Q&&(knowAll||!Q.hide||c.known.includes(q)))qF*=1+Q.v;}
  const fin=c.finish&&FINISHES[c.finish];if(fin)qF*=1+fin.v;
  return Math.round(d.base*ageF*kmF*condF*qF*(c.prem||1)/100)*100;
}
const askValue=c=>fairValue(c,true,false);   // what the market believes
const trueValue=c=>fairValue(c,false,true);  // what it is really worth
function genCar(mkey){
  const m=MARKETS[mkey];
  // weighted template pick
  let tot=0;const ws=CARS.map(d=>{
    if(d.army)return 0; // legerstock koopt ge alleen op het depot
    let w=[100,38,m.rare*110,m.legend*90][d.rar];
    if(d.y[1]<1988)w*=(m.risk>=2?1.5:.45);
    if(isCh("alan")&&d.rar>=2)w*=1.4;
    if(m.pref&&m.pref.f(d))w*=m.pref.w;
    tot+=w;return w});
  let r=Math.random()*tot,ci=0;
  for(let i=0;i<ws.length;i++){r-=ws[i];if(r<=0){ci=i;break}}
  const d=CARS[ci];
  const year=ri(d.y[0],Math.min(d.y[1],1995));
  const expKm=(1997-year)*19000+15000;
  const kmReal=Math.round(expKm*rnd(m.km[0],m.km[1])*rnd(.8,1.2)/1000)*1000;
  let km=kmReal;
  // sometimes the seller ALREADY rolled it back, the crooks
  if(Math.random()<m.dirty*.6){km=Math.round(kmReal*rnd(.45,.75)/1000)*1000;}
  const c={id:UID++,ci,year,km,kmReal,rolled:km<kmReal,
    eng:ri(m.cond[0],m.cond[1]),body:ri(m.cond[0],m.cond[1]),
    col:ri(0,COLORS.length-1),tuned:Math.random()<.12?1:0,
    quirks:[],known:[],papers:0,hot:false,origin:mkey,transit:false,askedBy:null};
  const nq=m.risk>=2?ri(0,3):ri(0,1);
  const pool=QUIRKS.map(q=>q.id).filter(q=>!(q==="tuned"&&c.tuned===0));
  for(let i=0;i<nq;i++){const q=pick(pool);if(!c.quirks.includes(q))c.quirks.push(q)}
  if(c.quirks.includes("tuned"))c.tuned=Math.max(c.tuned,1);
  const pr=Math.random();
  if(pr<m.fake){c.papers=2;c.hot=Math.random()<.5}
  else if(pr<m.fake+m.dirty){c.papers=1;c.hot=Math.random()<.12}

function genArmyCar(){
  const ci=pick(ARMY_IX),d=CARS[ci];

  const kmReal=Math.round(((1997-year)*22000+40000)*rnd(.9,1.5)/1000)*1000;
  const c={id:UID++,ci,year,km:kmReal,kmReal,rolled:false,
    eng:ri(45,80),body:ri(35,70),col:OLIVE_IX,tuned:0,
    quirks:[],known:[],papers:0,hot:false,origin:"leger",transit:false,askedBy:null};

  c.quirks.push("rust");if(Math.random()<.5)c.quirks.push("towbar");
  c.known=c.quirks.slice();
  c.ask=Math.round(trueValue(c)*rnd(.42,.6)/1000)*1000; // spotgoedkoop
  return c;
}

function shade(hex,f){const n=parseInt(hex.slice(1),16);let r=n>>16,g=n>>8&255,b=n&255;
  const t=f<0?0:255,a=Math.abs(f);
  r=Math.round(r+(t-r)*a);g=Math.round(g+(t-g)*a);b=Math.round(b+(t-b)*a);
  return "#"+(r<<16|g<<8|b|0x1000000).toString(16).slice(1)}
let AID=0;
function carArt(c,w){
  const sp=SPECS[c.ci],S=SHAPES[sp.s],hex=COLORS[c.col].h,uid=++AID;
  const q=c.quirks||[];
  const rust=q.includes("rust")||(c.body!=null&&c.body<32);
  const dull=c.body!=null&&c.body<45;
  const wing=sp.w||((c.tuned||0)>0?1:0);
  const FX=x=>(x+2), FY=y=>(48-y);
  const P=p=>FX(p[0]).toFixed(1)+" "+FY(p[1]).toFixed(1);
  // a third value of 1 on a point marks a sharp corner (duplicated so the curve pinches)
  const path=raw=>{const pts=raw.flatMap(p=>p[2]?[p,p]:[p]);
    const n=pts.length,mid=(a,b)=>[(a[0]+b[0])/2,(a[1]+b[1])/2];
    let s="M"+P(mid(pts[0],pts[1]));
    for(let i=1;i<=n;i++){const p=pts[i%n],m=mid(p,pts[(i+1)%n]);s+="Q"+P(p)+" "+P(m)}
    return s+"Z"};
  const poly=pts=>pts.map((p,i)=>(i?"L":"M")+P(p)).join("")+"Z";
  const bp=path(S.b);
  const W=Math.round(w*sp.len/4.6),H=Math.round(W*52/104);
  let s='<svg viewBox="0 0 104 52" width="'+W+'" height="'+H+'" xmlns="http://www.w3.org/2000/svg">';
  s+='<defs><linearGradient id="p'+uid+'" x1="0" y1="0" x2="0" y2="1">'
   +'<stop offset="0" stop-color="'+shade(hex,dull?.18:.42)+'"/>'

   +'<stop offset="1" stop-color="'+shade(hex,-.4)+'"/></linearGradient>'
   +'<linearGradient id="g'+uid+'" x1="0" y1="0" x2="0" y2="1">'
   +'<stop offset="0" stop-color="#b9d4e4"/><stop offset="1" stop-color="#27384b"/></linearGradient>'
   +'<clipPath id="c'+uid+'"><path d="'+bp+'"/></clipPath></defs>';
  s+='<ellipse cx="52" cy="49" rx="'+ (48*sp.len/4.6).toFixed(0) +'" ry="2.2" fill="#000" opacity=".38"/>';
  s+='<path d="'+bp+'" fill="url(#p'+uid+')" stroke="'+shade(hex,-.62)+'" stroke-width=".7"/>';
  s+='<g clip-path="url(#c'+uid+')">';
  if(S.mod)s+='<rect x="0" y="'+FY(S.gy+4.4)+'" width="104" height="'+(S.gy+8)+'" fill="rgba(12,9,20,.3)"/>';
  const belt=Math.min(...S.win[0].map(p=>p[1]));
  s+='<path d="M'+FX(4)+' '+FY(belt-1.1).toFixed(1)+' L'+FX(97)+' '+FY(belt-1.1).toFixed(1)+'" stroke="'+shade(hex,-.3)+'" stroke-width=".55" fill="none" opacity=".8"/>';
  s+='<circle cx="'+FX(S.fw)+'" cy="'+FY(S.wr)+'" r="'+(S.wr+1.7)+'" fill="#0d0a15"/>'
    +'<circle cx="'+FX(S.rw)+'" cy="'+FY(S.wr)+'" r="'+(S.wr+1.7)+'" fill="#0d0a15"/>';
  if(rust){[[S.rw-6,S.wr+3.2],[S.rw+6.5,S.wr+2.4],[S.fw-6.5,S.wr+2.6],[S.fw+6,S.wr+3.2],[48,S.gy+2.2]]
    .forEach((p,i)=>{s+='<circle cx="'+FX(p[0])+'" cy="'+FY(p[1])+'" r="'+(0.9+(i%3)*.4)+'" fill="#6e4a2c" opacity=".8"/>'})}
  s+='</g>';
  const wheel=x=>'<circle cx="'+FX(x)+'" cy="'+FY(S.wr)+'" r="'+S.wr+'" fill="#15131c" stroke="#05040a" stroke-width=".6"/>'
   +'<circle cx="'+FX(x)+'" cy="'+FY(S.wr)+'" r="'+(S.wr*.52).toFixed(1)+'" fill="#c9c8d3" stroke="#8a8898" stroke-width=".5"/>'
   +'<circle cx="'+FX(x)+'" cy="'+FY(S.wr)+'" r="'+(S.wr*.17).toFixed(1)+'" fill="#6e6d7c"/>';
  s+=wheel(S.fw)+wheel(S.rw);
  if(S.spat)s+='<g clip-path="url(#c'+uid+')"><rect x="'+FX(S.rw-7.5)+'" y="'+FY(S.wr+6.4)+'" width="15" height="4.8" fill="url(#p'+uid+')" stroke="'+shade(hex,-.45)+'" stroke-width=".4"/></g>';
  for(const wp of S.win)s+='<path d="'+poly(wp)+'" fill="url(#g'+uid+')" stroke="#10141c" stroke-width=".5" stroke-linejoin="round"/>';
  if(S.open){const wsx=S.win[0][0][0];
    s+='<ellipse cx="'+FX(wsx-9)+'" cy="'+FY(belt-.4)+'" rx="8" ry="1.7" fill="#100d16"/>'}
  const ht=sp.hl||"rect",[hx,hy]=S.hl;
  if(ht==="pop")s+='<rect x="'+FX(hx-2.4)+'" y="'+FY(hy+.6)+'" width="5" height="1.2" rx=".4" fill="#191722"/>';
  else if(ht==="round")s+='<circle cx="'+FX(hx)+'" cy="'+FY(hy)+'" r="1.9" fill="#ffedc4" stroke="#8a744d" stroke-width=".45"/>';
  else s+='<rect x="'+FX(hx-2)+'" y="'+FY(hy+1.2)+'" width="4.4" height="2.5" rx=".5" fill="#ffe9b0" stroke="#8a744d" stroke-width=".4"/>';
  s+='<rect x="'+FX(S.tl[0]-1)+'" y="'+FY(S.tl[1]+1.1)+'" width="2.5" height="2.3" rx=".4" fill="#d93840" stroke="#5c1418" stroke-width=".35"/>';
  if(S.chrome){const by=FY(S.gy+4.6);
    s+='<rect x="'+FX(92)+'" y="'+by+'" width="10" height="2" rx="1" fill="#d8d8e2" stroke="#7c7c8a" stroke-width=".4"/>'
     +'<rect x="'+FX(-1.5)+'" y="'+by+'" width="9" height="2" rx="1" fill="#d8d8e2" stroke="#7c7c8a" stroke-width=".4"/>'}
  if(wing){const[rx,ry]=S.rd;
    if(wing===2)s+='<rect x="'+FX(rx+1.2)+'" y="'+FY(ry+3.4)+'" width="1.3" height="3.6" fill="#181622"/>'
      +'<polygon points="'+P([rx-2,ry+4.8])+' '+P([rx+8,ry+5.6])+' '+P([rx+8,ry+4.2])+' '+P([rx-2,ry+3.4])+'" fill="#181622"/>';
    else s+='<polygon points="'+P([rx-2,ry+1.8])+' '+P([rx+6.5,ry+2.4])+' '+P([rx+6.5,ry+1.1])+' '+P([rx-2,ry+.4])+'" fill="#181622"/>';
  }
  s+='<rect x="'+FX(-.5)+'" y="'+FY(S.gy-.2)+'" width="2.6" height="1.2" rx=".5" fill="#6a6772"/>';
  return s+'</svg>';
}

function carMatches(c,w){
  const d=CARS[c.ci];
  if(w.any)return true;
  if(w.body)return w.body.includes(d.body);
  if(w.mk)return w.mk.includes(d.mk);
  if(w.dec==="old")return d.y[1]<1988;
  if(w.rar!=null)return d.rar>=w.rar;
  return true;
}

  for(const rd of G.rentDeals){
    if(rd.weeksLeft>0&&Math.random()<.06){rd.defaulted=true;
      if(Math.random()<.5){const rc={...rd.car,id:UID++};rc.eng=clamp((rc.eng||70)-ri(8,20),6,100);rc.body=clamp((rc.body||70)-ri(8,20),6,100);rc.known=(rc.quirks||[]).slice();rc.transit=false;G.cars.push(rc);
        extra.push(["⚠️ Huurkoop afgesprongen",rd.name+" · wagen teruggehaald","neg"]);
        log("⚠️ "+rd.name+" kan de "+rd.carName+" niet meer afbetalen. Ge haalt de wagen terug op — wel wat sleet erop. De aanbetaling houdt ge.");}
      else{extra.push(["⚠️ Huurkoop wanbetaling",rd.name+" · wagen weg","neg"]);
        log("⚠️ "+rd.name+" is met de "+rd.carName+" verdwenen en betaalt niet meer. Ge houdt enkel wat al binnen was. Rotzak.");}
      continue;}
    rd.weeksLeft--;G.cash+=rd.perWeek;G.earned+=rd.perWeek;rd.collected+=rd.perWeek;
    if(rd.weeksLeft<=0){rd.done=true;G.mile.rentDone=1;repAdd(1);
      extra.push(["✅ Huurkoop afbetaald",rd.name+" · "+rd.carName,"money"]);
      log("✅ "+rd.name+" heeft de "+rd.carName+" volledig afbetaald ("+fmt(rd.total)+" totaal). Nette klant, +1 rep.");}
    else extra.push(["💳 Huurkoop "+rd.name,"+"+fmt(rd.perWeek)+" · nog "+rd.weeksLeft+" wk","money"]);
  }
  G.rentDeals=G.rentDeals.filter(rd=>!rd.done&&!rd.defaulted);
  // staff wages, training & loyalty
  G.staffWeeks=G.staffWeeks||{};G.staffMorale=G.staffMorale||{};
  for(const k in G.staff){const st=STAFFDEF[k];G.cash-=st.cost;
    const lvlBefore=staffLvl(k);
    G.staffWeeks[k]=(G.staffWeeks[k]||0)+1;
    if(G.staffMorale[k]==null)G.staffMorale[k]=75;
    G.staffMorale[k]=clamp(G.staffMorale[k]-3,0,100);
    const lvlAfter=staffLvl(k);
    extra.push([st.face+" "+st.n+(lvlAfter>1?" "+"⭐".repeat(lvlAfter):""),"-"+fmt(st.cost),"neg"]);
    if(lvlAfter>lvlBefore){extra.push([st.face+" "+st.n,"promotie → niveau "+lvlAfter+"!","money"]);
      log(st.face+" "+st.n+" heeft er "+(G.staffWeeks[k])+" weken op zitten en wordt beter in de stiel (niveau "+lvlAfter+").")}
    if(G.staffMorale[k]<=0){delete G.staff[k];delete G.staffWeeks[k];delete G.staffMorale[k];
      extra.push([st.face+" "+st.n,"neemt ontslag!","neg"]);repAdd(-1);
      log("💢 "+st.face+" "+st.n+" heeft er genoeg van en stapt op. 'Nooit een bonus, nooit een dankjewel.'")}
    else if(G.staffMorale[k]<25)extra.push([st.face+" "+st.n,"⚠️ ontevreden ("+G.staffMorale[k]+"%) — geef een bonus","neg"]);}
  // Werknemer van de Maand: elke maand de beste kracht in de bloemetjes
  if(G.week%4===1){
    const hires=Object.keys(G.staff||{});
    if(hires.length){
      hires.sort((a,b)=>(staffLvl(b)-staffLvl(a))||(staffMorale(b)-staffMorale(a)));
      const win=hires[0];G.eotm=win;
      G.staffMorale[win]=clamp(staffMorale(win)+20,0,100);
      extra.push(["🏅 Werknemer v/d Maand",STAFFDEF[win].face+" "+STAFFDEF[win].n+" (+moraal)","money"]);
      log("🏅 "+STAFFDEF[win].face+" "+STAFFDEF[win].n+" is Werknemer van de Maand! Een bon, een handdruk en een plek aan de muur. De moraal zit weer goed.");
      G.mile.eotm=1;
    }else G.eotm=null;
  }
  // leerjongen in de garage: weekloon, leert bij, en promoveert uiteindelijk tot volwaardig monteur
  if(G.appr){
    const lb=apprLvl();
    G.cash-=APPR_WAGE;G.appr.weeks=(G.appr.weeks||0)+1;
    const la=apprLvl();
    extra.push(["🧑‍🔧 Leerjongen"+(la>1?" "+"⭐".repeat(la-1):""),"-"+fmt(APPR_WAGE),"neg"]);
    if(la>lb&&la<3){extra.push(["🧑‍🔧 Leerjongen","wordt beter → niveau "+la,"money"]);
      log("🧑‍🔧 De leerjongen heeft er "+G.appr.weeks+" weken op zitten en knoeit al veel minder. Niveau "+la+".")}
    if(la>=3&&!G.mile.apprPro){G.mile.apprPro=1;repAdd(2);
      extra.push(["🎓 Leerjongen uitgeleerd","volwaardig monteur! +2 rep","money"]);
      log("🎓 De leerjongen is uitgeleerd — na "+G.appr.weeks+" weken is 't een volwaardige monteur. Goedkope, propere klussen, geen geknoei meer. (+2 rep)");
      if(!silent){stamp("🎓 UITGELEERD","gold");sfx("level")}}
  }
  if(hasStaff("staf"))G.heat=clamp(G.heat-2,0,100);
  if(hasStaff("sonja")){const amt=staffLvl("sonja");for(const c of G.cars)if(c.body<82)c.body=Math.min(82,c.body+amt);}
  for(const c of G.cars){if(c.washT>0)c.washT--;if(c.rallyT>0)c.rallyT--;} // wasglans + rally-roem vervagen
  // lesauto's: wekelijkse huur, maar slijtage (en soms een tik)
  {let lesInc=0,prang=false;
   for(const c of G.cars)if(c.lesauto){
     const fee=Math.max(1500,Math.round(askValue(c)*.02/1000)*1000);
     lesInc+=fee;c.eng=clamp(c.eng-ri(1,2),5,100);c.body=clamp(c.body-1,5,100);
     if(Math.random()<.08){c.body=clamp(c.body-ri(3,6),5,100);prang=true;}}
   if(lesInc){G.cash+=lesInc;G.earned+=lesInc;
     extra.push(["🚗 Rijschool","huur +"+fmt(lesInc)+(prang?" · een leerling parkeerde 'creatief'":""),"money"]);}}
  // the barn: collection cars appreciate, but the damp creeps in
  for(const c of (G.collection||[])){
    c.collWeeks=(c.collWeeks||0)+1;
    c.prem=(c.prem||1)*(1+[.002,.0035,.005,.008][CARS[c.ci].rar]);
    const rustCh=hasStaff("dree")?.12:.25;
    if(Math.random()<rustCh){
      c.body=Math.max(8,c.body-(hasStaff("dree")?1:ri(1,2)));
      if(c.body<30&&!c.quirks.includes("rust")){c.quirks.push("rust");c.known.push("rust");
        extra.push(["🏚️ De schuur","de "+carName(c)+" heeft échte roest gekregen","neg"]);
        log("🏚️ De "+carName(c)+" in de schuur begint te roesten. Het vocht kruipt overal in.");}
    }
  }
  // collector orders
  for(const o of G.orders){o.eta--;
    if(o.eta<=0){extra.push(["📦 Zoekopdracht","verlopen: "+o.t,"neg"]);repAdd(-1)}}
  G.orders=G.orders.filter(o=>o.eta>0);
  if(G.unlocks.orders&&G.orders.length<3&&Math.random()<.3){
    const o=genOrder();G.orders.push(o);
    extra.push(["📦 Nieuwe zoekopdracht",o.t,""]);
    log("📞 Een verzamelaar zoekt: "+o.t+" (+"+Math.round((o.prem-1)*100)+"% premie, "+o.eta+" weken).")}
  // VIP droomwagen-opdracht (één tegelijk, alleen als de zaak wat naam heeft)
  if(G.vipQuest){G.vipQuest.eta--;
    if(G.vipQuest.eta<=0){extra.push(["⭐ VIP","teleurgesteld vertrokken: "+G.vipQuest.name,"neg"]);
      log("⭐ "+G.vipQuest.name+" wachtte tevergeefs op zijn droomwagen en gaat elders zoeken. (-2 rep)");repAdd(-2);G.vipQuest=null;}
    // Sabine van 't Autohuis kaapt trage opdrachten weg
    else if(!boughtOut("sabine")&&G.vipQuest.eta<=2&&Math.random()<.28){
      G.sabineSteals=(G.sabineSteals||0)+1;
      extra.push(["💃 Sabine van 't Autohuis","kaapte de opdracht van "+G.vipQuest.name+" weg","neg"]);
      log("💃 Sabine van 't Autohuis was sneller: zij leverde "+G.vipQuest.name+" zijn droomwagen vóór u. \"Sorry schat, zaken zijn zaken.\" (-1 rep)");
      repAdd(-1);G.vipQuest=null;}}
  if(!G.vipQuest&&G.unlocks.orders&&G.rep>=45&&Math.random()<.14){
    G.vipQuest=genVipQuest();
    extra.push(["⭐ VIP aan de deur",G.vipQuest.name,"money"]);
    log("⭐ "+G.vipQuest.name+" komt persoonlijk langs met een zoekopdracht: "+G.vipQuest.desc+" ("+Math.round((G.vipQuest.prem-1)*100)+"% premie, "+G.vipQuest.eta+" weken).")}
  // who's at the gate next week
  G.gastonHere=!G.bet&&Math.random()<.25;
  G.tip=Math.random()<.20;
  G.alinHere=!isCh("alan")&&(G.sloffen||0)<4&&Math.random()<.16;
  // Dany uit Ninove komt af en toe met een 'koopje' dat te goedkoop klinkt
  G.danyHere=!boughtOut("dany")&&Math.random()<.14;
  G.danyDeal=G.danyHere?genDanyDeal():null;
  // Koffie & Karren: af en toe een weekendmeet voor liefhebbers
  if(!G.carMeet&&Math.random()<.12)G.carMeet=true;
  // scratch-and-dent koopjesbak: af en toe een spotgoedkoop project
  if(!G.bargain&&Math.random()<.13)G.bargain=genBargain();
  // rivaal probeert personeel weg te kapen (alleen met personeel in dienst)
  if(G.poach&&!(G.staff&&G.staff[G.poach.key]))G.poach=null; // staffer al weg
  if(!G.poach){const hires=Object.keys(G.staff||{});
    if(hires.length&&Math.random()<.08){const key=pick(hires),rival=pick(POACHERS);G.poach={key,rival};
      extra.push(["🎣 Afwerving",STAFFDEF[key].n+" wordt weggelokt","neg"]);
      log("🎣 "+rival+" probeert "+STAFFDEF[key].face+" "+STAFFDEF[key].n+" weg te kapen met een dikker loon. Beslis op 't bureau of ge \'m houdt.");}}
  // barn-clearance job-lot: zeldzamer, een hele kavel ineens
  if(!G.jobLot&&Math.random()<.07)G.jobLot=genJobLot();
  // klassieker-magazine biedt een cover-feature aan (als je een geschikte wagen hebt)
  if(!G.magOffer&&G.cars.some(magEligible)&&Math.random()<.07)G.magOffer={mag:pick(MAGS)};
  // goede doel klopt aan voor een donatie
  if(!G.charity&&Math.random()<.06)G.charity={cause:pick(CHARITY_CAUSES)};
  // de platenman biedt af en toe een bulkdeal ZZ-platen aan
  if(!G.plateDeal&&Math.random()<.07)G.plateDeal=genPlateDeal();
  // flip-off: een rivaal daagt je uit (alleen als de zaak wat naam heeft)
  if(!G.flipChallenge&&(G.rep>=45||G.sold>=10)&&Math.random()<.10)G.flipChallenge=genFlipDare();
  // winterse nachtvorst: bedreigt de stock op 't koertje
  if(!G.frost&&season().n==="Winter"&&G.cars.length>0&&Math.random()<.18)G.frost=true;
  // Radio Essene bel-in wedstrijd: af en toe
  if(!G.radioContest&&Math.random()<.15)G.radioContest=pickContest();
  // TV-feature: één model plots gegeerd door een programma/film
  if(G.tvFeature&&G.tvFeature.weeks>0){
    G.tvFeature.weeks--;
    if(G.tvFeature.weeks<=0){const nm=tvLabel();G.tvFeature=null;
      extra.push(["📺 Rage voorbij",nm+" weer gewoon","neg"]);
      log("📺 De "+nm+"-rage is uitgeraasd. De prijzen zakken terug naar normaal — wie te lang wachtte, viste achter het net.")}
    else extra.push(["📺 TV-rage",tvLabel()+" nog "+G.tvFeature.weeks+" wk (+22%)","money"]);
  } else if(Math.random()<.05){startTvFeature();
    extra.push(["📺 TV-rage!",tvLabel()+" plots gegeerd","money"]);
    if(!silent){stamp("📺 RAGE","gold");sfx("win")}}
  platesTick(); genCustomers(); checkComebacks(); randomOffice(); inspection(); milestones();
  // reclamecampagne aftellen (na genCustomers, zodat deze week nog meetelt)
  if((G.adWeeks||0)>0){G.adWeeks--;repAdd(1);
    if(G.adWeeks>0)extra.push(["📣 Reclamecampagne","loopt nog "+G.adWeeks+" week/weken · extra volk","money"]);
    else{extra.push(["📣 Campagne afgelopen","de advertentie is uitgewerkt","neg"]);
      log("📣 De reclamecampagne is afgelopen. Het extra volk ebt weg, maar een paar namen blijven hangen.")}}
  // marktstand geldt maar één weekend
  if(G.marketWeek){G.marketWeek=false;extra.push(["🏬 Marktweekend voorbij","de kraam wordt weer ingeklapt",""]);}
  if(G.cash<creditLimit()-100000&&G.cars.length===0){G.over=true;}
  const delta=G.cash-(G.wkStart!=null?G.wkStart:G.cash);
  if(!silent&&!G.over){
    if(newYear){if(modalOpen())G.pendingGala=1;else showAwards()}
    else weekReport(wkLbl,delta,of.rent,skimmed,extra);}
  G.wkStart=G.cash;G.wkSold=0;G.spun=false;
  save();
}

  const HEADLINES={
   S:["Essense handelaar heeft de gouden hand","'Occasiekoning van het Pajottenland' (foto op pagina 3)","Recordweek voor de garage aan Koudenberg","Kranig! Heel Essene praat erover."],
   A:["Zaken gaan goed te Essene","'Kwaliteit verkoopt zichzelf,' zegt zaakvoerder","Sterke week. De asbak was het waard.","Handelaar uit Essene 'ziet de toekomst zonnig in'"],

   C:["Magere week voor lokale handelaar","'De markt zit tegen,' klinkt het aan Koudenberg","Magertjes. Meer babbelen, minder roken.","Lezersvraag: 'Staat die Lada daar nu al drie weken?'"],
   D:["Vragen bij de toekomst van garage te Essene","Au. Zelfs de buschauffeur kijkt bezorgd.","'Alles is te koop,' zucht zaakvoerder. Ook de bureaustoel.","Duivenbond doet betere zaken dan de autohandel, becijfert lezer"]};
  const OMINOUS=["Gerucht: onderzoek naar autohandel in de regio","'Waar komen al die wagens toch vandaan?' vraagt lezer uit Ternat","Opvallend veel Oostblok-nummerplaten gespot langs de N8"];
  const headline=(G.heat>60&&Math.random()<.4)?pick(OMINOUS):pick(HEADLINES[gr[0]]);
  const lines=[
   ["Weekresultaat",(delta>=0?"+":"")+fmt(delta),delta>=0?"money":"neg"],
   ["Verkocht",(G.wkSold||0)+" wagen(s)",""],
   ["Huur","-"+fmt(rent),"neg"],
  ];

  if(extra)for(const e of extra)lines.push(e);
  modal('<div class="center"><b>📋 Weekrapport · '+wkLbl+'</b></div><hr>'
   +lines.map((l,i)=>'<div class="spread repline" style="animation-delay:'+(i*.16)+'s"><span class="dim">'+l[0]+'</span><b class="'+l[2]+'">'+l[1]+'</b></div>').join("")
   +'<div class="center repline" style="animation-delay:'+(lines.length*.16+.25)+'s"><span class="grade" style="color:'+gr[1]+';border-color:'+gr[1]+'">'+gr[0]+'</span>'
   +'<div class="small dim">De Streekkrant: "'+headline+'"</div></div>',
  [{t:"Aan de slag",fn:closeModal}]);
}

function inspection(){
  if(G.heat<60||modalOpen()||Math.random()>(G.heat-50)/120)return;
  const fakes=G.cars.filter(c=>c.papers===2||c.hot);
  let msg="<b>💼 Economische Inspectie valt binnen.</b><br>Twee heren in regenjas, map onder de arm. Ze ruiken aan de koffie en vragen naar de boekhouding.<br><br>";
  if(fakes.length===0&&G.heat<80){
    msg+="Ze vinden niets. Eén van hen koopt bijna een Volvo. Heat zakt.";
    G.heat=clamp(G.heat-20,0,100);
    modal(msg,[{t:"Oef.",fn:()=>{closeModal();render()}}]);
  }else if(fakes.length>0){
    raidModal(fakes);
  }else{
    const fine=40000;ouch();G.cash-=fine;G.heat=clamp(G.heat-15,0,100);
    msg+="De administratie is 'onvolledig'. Boete: <b>"+fmt(fine)+"</b>. Kon erger.";
    modal(msg,[{t:"Betalen en glimlachen",fn:()=>{closeModal();render()}}]);
  }
}

function resolveRaid(hideIds){
  const fakes=RAID?RAID.fakes:G.cars.filter(c=>c.papers===2||c.hot);
  hideIds=(hideIds||[]).slice(0,HIDE_MAX);
  const catchP=hasStaff("staf")?.09:.18;
  const seized=[],hidden=[],caught=[];
  for(const c of fakes){
    if(hideIds.includes(c.id)){
      if(Math.random()<catchP){caught.push(c);seized.push(c);}
      else hidden.push(c);
    }else seized.push(c);
  }
  let fine=0;
  for(const c of seized){fine+=Math.min(Math.max(50000,Math.round(trueValue(c)*.15)),250000);
    G.cars=G.cars.filter(x=>x.id!==c.id);}
  if(caught.length)fine+=caught.length*25000; // betrapt bij het wegmoffelen = extra
  G.cash-=fine;G.heat=clamp(G.heat-25,0,100);
  if(seized.length)repAdd(-6-caught.length*3);else repAdd(hidden.length?1:0);
  let msg="<b>💼 Inspectie afgelopen.</b><br>";
  if(caught.length){ouch();
    msg+="Ze zágen u nog net de <b>"+esc(carName(caught[0]))+"</b> wegduwen. \"Interessant.\" Dat viel slecht. ";}
  if(seized.length){ouch();
    msg+=seized.length+" wagen(s) aangeslagen, boete <b>"+fmt(fine)+"</b>. ";
    G.mile.raidHit=1;
    log("Razzia: "+seized.length+" wagen(s) aangeslagen"+(caught.length?" (waarvan "+caught.length+" betrapt bij 't wegmoffelen)":"")+", boete "+fmt(fine)+".");}
  if(hidden.length&&!seized.length){
    msg+="Alles netjes achter de poort. Ze vinden niets, drinken uw koffie, en vertrekken teleurgesteld. "+chr().n+" ademt weer. ";
    G.mile.raidClean=1;addXP(20);
    log("Razzia overleefd: "+hidden.length+" wagen(s) op tijd weggemoffeld, niets gevonden.");}
  else if(hidden.length)msg+="De "+hidden.map(c=>esc(carName(c))).join(" en de ")+" bleef veilig achter de poort. ";
  RAID=null;
  modal(msg,[{t:seized.length?"Verdomme.":"Oef.",fn:()=>{closeModal();render()}}]);
}

let AC=null,MUTE=false;try{MUTE=localStorage.getItem("cm_mute")==="1"}catch(e){}
function beep(f,t0,dur,type,vol,slide){const o=AC.createOscillator(),g=AC.createGain();o.type=type||"square";
  o.frequency.setValueAtTime(f,AC.currentTime+t0);
  if(slide)o.frequency.exponentialRampToValueAtTime(slide,AC.currentTime+t0+dur);
  g.gain.setValueAtTime(0,AC.currentTime+t0);g.gain.linearRampToValueAtTime(vol||.1,AC.currentTime+t0+.012);
  g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+t0+dur);
  o.connect(g).connect(AC.destination);o.start(AC.currentTime+t0);o.stop(AC.currentTime+t0+dur+.03)}
function sfx(n){if(MUTE)return;
  try{AC=AC||new(window.AudioContext||window.webkitAudioContext)();if(AC.state==="suspended")AC.resume();
  ({kaching:()=>{beep(1318,0,.09,"square",.09);beep(1760,.07,.24,"square",.09)},
    thud:()=>beep(95,0,.16,"square",.16,58),
    tick:()=>beep(2600,0,.03,"square",.04),
    level:()=>[523,659,784,1046].forEach((f,i)=>beep(f,i*.09,.13,"square",.08)),
    win:()=>[784,988,1175,1568,1976].forEach((f,i)=>beep(f,i*.07,.11,"square",.08)),
    bad:()=>beep(196,0,.28,"sawtooth",.11,110),
    scratch:()=>beep(900,0,.045,"sawtooth",.05),
    honk:()=>{beep(660,0,.11,"square",.12);beep(660,.16,.2,"square",.12)},
    modem:()=>{beep(350,0,.35,"sine",.06);beep(440,.1,.35,"sine",.06);beep(1300,.5,.3,"sine",.07);
      beep(2100,.82,.28,"sine",.06);beep(980,1.12,.25,"sawtooth",.05,2400);beep(1700,1.4,.6,"square",.03,3200)}})[n]()}catch(e){}}

function genJobLot(){
  const n=ri(3,5);const cars=[];let sumTrue=0;
  for(let i=0;i<n;i++){
    let c;
    if(Math.random()<.18){ // verborgen parel
      for(let t=0;t<40&&!c;t++){const cc=genCar("ua");if(CARS[cc.ci].rar>=2)c=cc;}
      if(!c)c=genCar("ua");
      c.eng=Math.max(c.eng,70);c.body=Math.max(c.body,65);
    } else { // ruwe schuurwagen
      c=genCar(pick(["nl","pl","ua","de"]));
      c.eng=clamp(c.eng-ri(20,45),6,70);c.body=clamp(c.body-ri(20,45),6,70);
      if(Math.random()<.4&&c.quirks.filter(q=>{const Q=QUIRKS.find(x=>x.id===q);return Q&&Q.hide}).length<1){
        const q=pick(["gearbox","electr","warm","rust"]);if(!c.quirks.includes(q))c.quirks.push(q);}
    }
    c.transit=false;c.known=[];c.papers=Math.random()<.35?1:0;c.hot=false;c.rolled=false;
    sumTrue+=trueValue(c);cars.push(c);
  }
  const price=Math.max(10000,Math.round(sumTrue*rnd(.28,.40)/1000)*1000);

function genJdmCar(){
  const pool=CARS.map((d,i)=>({d,i})).filter(x=>JDM_MAKES.includes(x.d.mk));
  let tot=0;const ws=pool.map(x=>{let w=1;if(["sport","coupe"].includes(x.d.body))w*=3;w*=1+x.d.rar;tot+=w;return w});

  const d=CARS[ci],year=ri(d.y[0],Math.min(d.y[1],1995));
  const kmReal=Math.round(((1997-year)*15000+20000)*rnd(.7,1.2)/1000)*1000; // Japanse km's: laag en eerlijk
  return {id:UID++,ci,year,km:kmReal,kmReal,rolled:false,
    eng:ri(72,95),body:ri(65,92),col:ri(0,COLORS.length-1),tuned:Math.random()<.3?1:0,

  for(let i=0;i<WHEEL.length;i++){r-=WHEEL[i].w;if(r<=0){si=i;break}}
  const seg=WHEEL[si];
  const land=()=>{
    if(WIV){clearInterval(WIV);WIV=null}
    G.spun=true;seg.fn();addXP(3);save();hdr();
    modal('<div class="center" style="padding:10px 0"><div class="reel">'+seg.e+'</div><b>'+seg.t+'</b></div>',
     [{t:"OK",fn:closeModal}]);
  };
  if(!REEL_MS){land();return}
  const n=WHEEL.length,sa=360/n;
  const slices=WHEEL.map((w,i)=>WCOLS[i%WCOLS.length]+" "+(i*sa)+"deg "+((i+1)*sa)+"deg").join(",");
  const ems=WHEEL.map((w,i)=>{const a=i*sa+sa/2;
    return '<span class="wseg" style="transform:rotate('+a+'deg) translateY(-70px) rotate('+(-a)+'deg)">'+w.e+'</span>'}).join("");
  modal('<div class="center"><b>🎡 Rad van Koudenberg</b>'
   +'<div class="wheelwrap"><div class="wheelptr">▼</div>'
   +'<div class="wheel" id="wheelEl" style="background:conic-gradient('+slices+')">'+ems+'<div class="wheelhub"></div></div></div>'
   +'<div class="small dim">Het rad ratelt aan de bushalte...</div></div>',[]);
  const target=5*360+(360-(si*sa+sa/2));
  requestAnimationFrame(()=>requestAnimationFrame(()=>{const el=$("wheelEl");
    if(el){el.style.transition="transform 2.8s cubic-bezier(.12,.75,.2,1)";el.style.transform="rotate("+target+"deg)"}}));
  WIV=setInterval(()=>sfx("tick"),110);
  setTimeout(land,3050);
}

const CONCOURS_FEE=10000;
function concoursOn(){return season().n==="Zomer"&&G.mile.concoursYear!==G.year}
function concoursEligible(c){const d=CARS[c.ci];return (c.year<1985||d.rar>=2)&&c.eng>=65&&c.body>=65}
function concoursScore(c){const d=CARS[c.ci];
  return Math.round(Math.max(0,1985-c.year)*1.2+(c.eng+c.body)/2+d.rar*25+(c.finish&&c.finish!=="solid"?12:0));}
function enterConcours(id){

  modal("<b>🏛️ De jury heeft geoordeeld.</b><br>De <b>"+esc(carName(c))+"</b> ("+c.year+") behaalt <b>"+place+"</b>.<br><br>Prijzengeld: <b class='money'>"+fmt(prize)+"</b> · reputatie +"+rep+". De wagen staat weer op het koertje, nu mét een pluim.",

function moveToColl(id){
  const c=getCar(id);if(!c)return;
  if((G.collection||[]).length>=G.collSlots){toast("De schuur staat vol. Uitbreiden kan in de garage.");return}
  G.cars=G.cars.filter(x=>x.id!==c.id);c.collWeeks=0;
  G.collection.push(c);save();closeModal();
  log(carName(c)+" in de schuur gelegd. Voor later. Voor de mooie dagen.");
  toast("🏛️ De "+carName(c)+" ligt in de schuur, onder een zeil dat er deftig uitziet.");
  CUR="garage";render();
}
function collPull(id){
  const c=(G.collection||[]).find(x=>x.id===id);if(!c)return;
  G.collection=G.collection.filter(x=>x.id!==id);
  G.cars.push(c);save();closeModal();
  log(carName(c)+" uit de schuur gehaald ("+(c.collWeeks||0)+" weken, +"+Math.round(((c.prem||1)-1)*100)+"% waarde). Terug in de stock.");
  toast("🔧 Zeil eraf, banden opgepompt. De "+carName(c)+" staat terug te koop.");
  CUR="garage";render();
}
function openCollCar(id){
  const c=(G.collection||[]).find(x=>x.id===id);if(!c)return;
  const up=Math.round(((c.prem||1)-1)*100);
  modal(mkCarSheet(c,true)
   +'<div class="small dim" style="margin-top:4px">'+(c.collWeeks||0)+' weken in de schuur · waarde <b class="money">'+fmt(askValue(c))+'</b> (+'+up+'%)</div>'
   +'<div class="small dim">Elke week een beetje meer waard. Elke week een beetje meer vocht.</div><hr><div class="tablebtns">'
   +'<button class="btn primary" onclick="collPull('+c.id+')">⬅️ Terug naar de stock</button>'
   +'<button class="btn" onclick="show3D((G.collection||[]).find(x=>x.id==='+c.id+'),false)">🌀 Showroom 3D</button>'
   +'</div>',
  [{t:"Zeil er terug over",cls:"ghost",fn:closeModal}]);

function expandBarn(){
  if(G.collSlots>=6)return;
  if(G.cash-250000<creditLimit()){toast("Te weinig geld voor de aannemer.");return}
  G.cash-=250000;G.collSlots++;save();sfx("kaching");popNum("-"+fmt(250000),"pred");
  log("Schuur uitgebreid naar "+G.collSlots+" plaatsen. De aannemer vroeg geen factuur. Wij ook niet.");
  render();
}
function hireAppr(){
  if(G.appr){toast("Ge hebt al een leerjongen.");return}
  G.appr={weeks:0,jobs:0};G.mile.appr=1;save();sfx("kaching");
  log("🧑‍🔧 Een leerjongen uit de vakschool van Aalst begint in de garage. Enthousiast, twee linkerhanden, maar dat komt wel goed. Loon "+fmt(APPR_WAGE)+"/week.");
  toast("🧑‍🔧 Leerjongen aangenomen. Hij mag maandag beginnen. Of, ja, vandaag.");

}

  const repB=Math.round((100-c.body)/100*CARS[c.ci].base*.13*(hasStaff("roger")?.85:1)*apprMul()/1000)*1000;
  const shM=shadyMult();
  const rollC=Math.round(8000*shM),papC=Math.round(30000*shM);
  const swept=SWEEP===c.id;SWEEP=null;
  let h=(swept?mkCarSheet(c,true).replace('class="carpic big"','class="carpic big sweepwrap"'):mkCarSheet(c,true))

const KEURING_FEE=4000, KEURING_BONUS=.05;
const KEUR_FAIL_Q=["crash","flood","gearbox","electr","warm"];
function keuringFails(c){return c.eng<50||c.body<50||c.quirks.some(q=>KEUR_FAIL_Q.includes(q));}
function keuringCar(id){
  const c=getCar(id);if(!c)return;

  G.cash-=KEURING_FEE;popNum("-"+fmt(KEURING_FEE),"pred");
  const fail=keuringFails(c);

    c.keured=1;G.mile.keuring=1;addXP(6);sfx("kaching");stamp("GROENE KAART","gold");

     [{t:"Netjes!",fn:()=>{closeModal();openCar(id);hdr()}}]);
  } else {
    // afgekeurd: de gebreken komen aan het licht (voortaan bekend/te melden)
    const revealed=[];
    for(const q of c.quirks)if(KEUR_FAIL_Q.includes(q)&&!c.known.includes(q)){c.known.push(q);const Q=QUIRKS.find(x=>x.id===q);if(Q)revealed.push(Q.t);}
    if(c.eng<50)revealed.push("motor onder de norm");if(c.body<50)revealed.push("koetswerk te zwak");
    sfx("bad");ouch();stamp("RODE KAART","pink");
    log("❌ De "+carName(c)+" is AFGEKEURD — rode kaart. De keurmeester noteert alles; verzwijgen kan nu niet meer. Eerst herstellen.");
    modal("<b>❌ Rode kaart!</b><br>De keurmeester loopt fronsend rond de <b>"+esc(carName(c))+"</b> en tikt af: <i>"+esc(revealed.join(", ")||"diverse gebreken")+"</i>. Afgekeurd. Herstel eerst, dan opnieuw. De keuringskost ("+fmt(KEURING_FEE)+") zijt ge kwijt.",
     [{t:"Verdorie.",fn:()=>{closeModal();openCar(id);hdr()}}]);
  }

function openCust(cid){
  const cu=G.custs.find(x=>x.id===cid);if(!cu)return;
  let h='<b>'+(cu.face||"🙋")+' '+cu.name+'</b> <span class="dim small">'+cu.t+'</span><hr>';
  const forSale=G.cars.filter(c=>!c.lesauto);
  for(const c of forSale){
    const m=carMatches(c,cu.want);
    h+='<div class="carline" onclick="openNeg('+cid+','+c.id+')"><div class="carpic" style="width:86px">'+carArt(c,88)+'</div><div style="flex:1"><b>'+esc(carName(c))+'</b> <span class="small dim">('+c.year+')</span>'
     +'<div class="small">'+(m?'<span class="pill good">past bij de vraag</span>':'<span class="pill">niet echt wat die zoekt</span>')+'</div></div>'
     +'<div class="money small">'+fmt(askValue(c))+'</div></div>';
  }
  if(G.cars.some(c=>c.lesauto))h+='<div class="small dim">🚗 Wagens in dienst als lesauto staan niet te koop — haal ze eerst uit de rijschool.</div>';
  modal(h,[{t:"Sluiten",cls:"ghost",fn:closeModal}]);
}
function hiddenIssues(c){
  const list=[];
  if(c.rolled)list.push({id:"__rolled",t:"teller is teruggedraaid",pen:.15});
  if(c.eng<45)list.push({id:"__eng",t:"motor is eigenlijk versleten",pen:.12});
  for(const q of c.quirks){const Q=QUIRKS.find(x=>x.id===q);
    if(Q&&Q.hide)list.push({id:q,t:Q.t,pen:-Q.v});}
  if(c.papers===2||c.hot)list.push({id:"__pap",t:"papieren zijn... creatief",pen:.2});
  return list;
}

const TAGICON={charm:"😏",shady:"🚬",zakelijk:"💼"};
function talkRoll(mv){
  let p=mv.p+Math.min(.08,((G.lvl||1)-1)*.006);
  if((mv.g==="charm"&&isCh("thomas"))||(mv.g==="shady"&&isCh("alan"))||(mv.g==="zakelijk"&&isCh("martine")))p+=.15;
  const r=Math.random();
  return r<p?1:r<p+.18?0:-1;
}
function pickTalks(ctx,n){
  const pool=TALK[ctx],ix=[];
  let guard=0;
  while(ix.length<n&&ix.length<pool.length&&guard++<100){const i=Math.floor(Math.random()*pool.length);if(!ix.includes(i))ix.push(i)}
  for(let i=0;ix.length<Math.min(n,pool.length)&&i<pool.length;i++)if(!ix.includes(i))ix.push(i);
  return ix;
}

function applyTalk(ctx,st,k){
  const mv=TALK[ctx][st.choices[k]];
  const out=talkRoll(mv);
  st.lastYou=mv.t;st.left--;
  if(out===1){st.bonus=clamp(st.bonus+mv.e,-.25,.25);st.lastThem=pick(mv.ok);

    popNum("+"+Math.round(mv.e*100)+"% 🎲","pgreen");sfx("kaching");}
  else if(out===-1){st.bonus=clamp(st.bonus-mv.e*.8,-.25,.25);st.lastThem=pick(mv.no);
    popNum("-"+Math.round(mv.e*80)+"% 🎲","pred");sfx("bad");}
  else{st.lastThem=pick(TALK.neutral);}
  st.choices=pickTalks(ctx,3);
  return out;
}

function engineStart(){if(MUTE)return;

  ENGG=AC.createGain();ENGG.gain.value=.028;ENGG.connect(AC.destination);

  const len=AC.sampleRate*0.5,buf=AC.createBuffer(1,len,AC.sampleRate),d=buf.getChannelData(0);

const ROAD_HALF=7, TRACK_STEP=4, TRACK_LEN=9000;
/* one track, chase_hq/Jellei-HQ style: heading integrated over curvature, in metres.
   the car, camera, road ribbon and traffic ALL sample this via tdPosAt — so nothing
   can ever drift out from under anything else (the old dual-track bug). */
function buildTrack(){
  const segs=[]; let s=0,lastDir=0;
  while(s<TRACK_LEN){
    const len=190+Math.random()*380;
    let dir=Math.random()<.5?-1:1;
    if(dir===lastDir&&Math.random()<.5)dir=-dir; lastDir=dir;
    const c=Math.random()<.42?0:dir*(0.0013+Math.random()*0.0024);
    segs.push({s0:s,s1:s+len,c}); s+=len;
  }
  const sm=t=>t*t*(3-2*t);
  const curvAt=ss=>{for(const g of segs)if(ss>=g.s0&&ss<=g.s1){
    const t=(ss-g.s0)/(g.s1-g.s0);return g.c*sm(clamp(Math.min(t,1-t)/0.25,0,1))} return 0};
  const p1=Math.random()*50,p2=Math.random()*50,hillAmp=6;
  const elevAt=ss=>hillAmp*(Math.sin(ss/430+p1)*0.6+Math.sin(ss/151+p2)*0.25+Math.sin(ss/940)*0.5);
  const pts=[]; let x=0,z=0,h=0; const n=Math.floor(TRACK_LEN/TRACK_STEP);
  for(let i=0;i<=n;i++){const ss=i*TRACK_STEP,c=curvAt(ss);
    pts.push({x,y:elevAt(ss),z,h,c}); h+=c*TRACK_STEP; x+=Math.sin(h)*TRACK_STEP; z+=-Math.cos(h)*TRACK_STEP}
  for(let i=0;i<n;i++)pts[i].sl=(pts[i+1].y-pts[i].y)/TRACK_STEP; pts[n].sl=0;
  return {pts,len:n*TRACK_STEP};
}
function tdPosAt(s,lat,out){
  s=clamp(s,0,TD.trk.len-TRACK_STEP*1.01);
  const i=Math.floor(s/TRACK_STEP),f=(s-i*TRACK_STEP)/TRACK_STEP;
  const a=TD.trk.pts[i],b=TD.trk.pts[i+1];
  const h=a.h+(b.h-a.h)*f, lx=-Math.cos(h), lz=-Math.sin(h);
  out.x=a.x+(b.x-a.x)*f+lx*lat; out.y=a.y+(b.y-a.y)*f; out.z=a.z+(b.z-a.z)*f+lz*lat;
  out.h=h; out.sl=a.sl+(b.sl-a.sl)*f; out.c=a.c; return out;
}

function td3dRibbon(lats){
  const pts=TD.trk.pts,rows=pts.length,cols=lats.length;
  const pos=new Float32Array(rows*cols*3),uv=new Float32Array(rows*cols*2);
  let p=0,q=0;
  for(let r=0;r<rows;r++){const pt=pts[r],lx=-Math.cos(pt.h),lz=-Math.sin(pt.h);
    for(let c2=0;c2<cols;c2++){const lat=lats[c2];

      uv[q++]=c2/(cols-1);uv[q++]=r*TRACK_STEP/4.2}}

  for(let r=0;r<rows-1;r++)for(let c2=0;c2<cols-1;c2++){const a=r*cols+c2,b=a+cols;idx.push(a,b,a+1,a+1,b,b+1)}

}

function td3dFrame(dt){

  T3.cam.position.z+=(camZ-T3.cam.position.z)*k;
  if(TD.shake>0){const q=TD.shake*TD.shake;
    T3.cam.position.x+=Math.sin(TD.t*47)*q*0.7;
    T3.cam.position.y+=Math.sin(TD.t*61+1.7)*q*0.5;}

  T3.cam.up.set(0,1,0);
  T3.cam.lookAt(cl.x,cl.y+0.6,cl.z);
  const roll=TD.steerVis*0.05 + TD.skid*(TD.steerVis>=0?1:-1)*0.06;

function tdTick(dt){

    TD.t+=dt;

    toast("🧧 Cash in de enveloppe. Niks gezien, niks gehoord.");}
  const tradeCut=useTrade?Math.min(cu.tradeClaim,price):0;
  const useBarter=!!(cu._useBarter&&cu.barter);
  const barterCut=useBarter?Math.min(cu.barter.value,price-tradeCut):0;
  const barterResell=useBarter?Math.round(barterCut*0.9):0; // je verzilvert de goederen voor ~90%
  const useMoto=!!(cu._useMoto&&cu.moto);
  const motoCut=useMoto?Math.min(cu.moto.value,price-tradeCut-barterCut):0; // moto dekt een deel van de prijs
  const motoFlip=motoCut; // meteen doorgeflipt aan een bikercontact voor de volle waarde
  const useFinance=!!cu._useFinance;
  const finKick=useFinance?Math.round(price*FIN_COMMISSION/1000)*1000:0; // dossiercommissie van de bank
  const net=price-tradeCut-barterCut-motoCut+motoFlip+barterResell+finKick;
  G.cash+=net;G.earned+=net;G.sold++;G.wkSold=(G.wkSold||0)+1;
  if(useFinance){G.mile.financing=1;
    log("🏦 "+cu.name+" kocht op afbetaling via Krefima — de bank betaalt de volle "+fmt(price)+" cash, plus "+fmt(finKick)+" dossiercommissie voor u. Geen risico, geen wachten.");
    toast("🏦 Bankfinanciering: volle prijs cash + commissie.");}
  if(useBarter){G.mile.barter=1;
    log("🤝 "+cu.name+" betaalde deels met "+cu.barter.item+" ("+fmt(barterCut)+" van de prijs). Doorverkocht voor "+fmt(barterResell)+".");
    toast("🤝 Ruildeal: "+cu.barter.item);}
  if(useMoto){G.mile.moto=1;
    log("🏍️ "+cu.name+" gaf "+cu.moto.name+" in ruil ("+fmt(motoCut)+" van de prijs). Ge belde uw bikercontact — meteen doorgeflipt voor de volle "+fmt(motoFlip)+", geen wagen erbij op 't koertje.");
    toast("🏍️ Moto ingeruild en meteen doorgeflipt.");}
  if(useTrade){const tc=cu.tradeIn;tc.paid=tradeCut;tc.tradein=1;tc.known=tc.quirks.slice();
    if(tc.rolled)tc.known.push("__rolled");G.cars.push(tc);G.mile.tradeIn=1;
    log("🔄 "+cu.name+" ruilde zijn "+carName(tc)+" in ("+fmt(tradeCut)+" van de prijs). Nu maar hopen dat 't meevalt.");
    toast("🔄 Inruilwagen op het koertje: "+carName(tc));}
  // een ooit-ingeruilde wagen met winst doorverkopen
  if(c.tradein&&(price-tradeCut)>(c.paid||0))G.mile.tradeFlip=1;
  // een koopjesbak-project met winst doorverkopen
  if(c.bargain&&(price-tradeCut)>(c.paid||0))G.mile.bargainFlip=1;
  const saleProfit=price-(c.paid||0);
  const jackpot=saleProfit>=150000||(c.paid>0&&saleProfit>=2*c.paid);
  stamp("DEAL!","gold");popNum("+"+fmt(net),"pgreen");sfx("kaching");confetti(26);coinBurst(saleProfit);driveOff(c);
  if(jackpot){G.mile.jackpotSale=1;stamp("💰 MONSTERDEAL","gold");shakeLite();confetti(30);}
  addXP(25+clamp(Math.round((price-(c.paid||0))/25000),0,15));
  // combo streak
  G.combo=(G.combo||0)+1;
  if(G.combo>=2){stamp("COMBO ×"+G.combo,"pink");addXP(Math.min(G.combo-1,5)*8)}
  // klantenkaart: elke verkoop een stempel
  addStamp();
  // pearl: flawless car sold
  if(c.eng>=95&&c.body>=95){stamp("PAREL!","pink");repAdd(2);addXP(10)}
  // VIP customer
  if(cu.vip){stamp("VIP KLANT!","pink");repAdd(5);addXP(20);log("⭐ "+cu.name+" vertelt het op café én op de radio.")}
  // collection
  if(CARS[c.ci].rar===3)G.mile.legendSold=1;
  if(isCotm(c))G.mile.cotmSold=1;
  if(isRadioCar(c))G.mile.radioSold=1;
  if(clearanceOn())G.mile.clearance=1;
  if(colorMatch(cu,c))G.mile.colorMatch=1;
  if(brandMatch(cu,c))G.mile.brandMatch=1;
  if(modelMatch(cu,c))G.mile.modelMatch=1;
  if(cu.flush)G.mile.flush=1;
  if(cu.testFirst&&(c.tested||c.driven))G.mile.testFirst=1;
  if(tyresInSeason(c))G.mile.tyresSold=1;
  if(isTvFeatured(c))G.mile.tvFeature=1;
  if(isCabrioHot(c))G.mile.cabrioSpike=1;
  if(isFairClassic(c))G.mile.classicFair=1;
  if(isGuzzlerHot(c))G.mile.cheapFuel=1;
  if(c.vipPlate)G.mile.vipPlate=1;
  if(isCarYear(c))G.mile.carYear=1;
  G.modelsSold=G.modelsSold||{};G.modelsSold[c.ci]=1;
  const nm=Object.keys(G.modelsSold).length,M=G.mile;
  if(!M.c10&&nm>=10){M.c10=1;stamp("10 MODELLEN","gold");addXP(30)}
  if(!M.c25&&nm>=25){M.c25=1;stamp("25 MODELLEN","gold");addXP(60)}
  if(!M.c50&&nm>=50){M.c50=1;stamp("50 MODELLEN","gold");confetti(60);addXP(120)}
  const cix=G.cars.findIndex(x=>x.id===c.id);if(cix>=0)G.cars.splice(cix,1);
  G.custs=G.custs.filter(x=>x.id!==cu.id);
  const hiddenLeft=iss.filter(i=>!disclosed.includes(i.id));
  const honest=hiddenLeft.length===0;
  if(cu.inspector&&honest)G.mile.inspector=1;
  repAdd(honest?3:1);
  if(honest){enrollLoyal(cu.name);if(Math.random()<.3)G.postcards.push({eta:ri(2,5),name:cu.name});}
  if(cu.returning)G.mile.loyalSold=1;
  // tevreden klant verwijst soms een vriend/familielid door (chain bij eerlijk zakendoen)
  const happy=honest||(c.eng>=95&&c.body>=95)||G.rep>=60;
  if(happy&&(G.referrals||[]).length<4&&Math.random()<clamp(.22+G.rep/500,.15,.5)){
    G.referrals=G.referrals||[];
    const chain=cu.referred?(cu.chain||1)+1:1;
    G.referrals.push({referrer:cu.name,want:{body:[CARS[c.ci].body]},chain,face:pick(CFACES)});
    log("🗣️ "+cu.name+" is tevreden en belooft een "+(cu.referred?"volgende":"")+"vriend door te sturen. Mond-tot-mondreclame, de beste soort.");
  }
  if(cu.referred){G.mile.referral=1;if((cu.chain||1)>=3)G.mile.referChain=1;}
  const profit=price-(c.paid||0);
  // record profit
  if(profit>(G.recProfit||0)){
    if(G.recProfit>0){stamp("RECORDWINST!","gold");confetti(40)}
    G.recProfit=profit;}
  log(carName(c)+" verkocht aan "+cu.name+" voor "+fmt(price)+" ("+(profit>=0?"winst ":"verlies ")+fmt(Math.abs(profit))+")."+(honest?"":" Sommige details zijn... onvermeld gebleven."));
  if(!honest){
    heatAdd(3);
    if(Math.random()<.5){
      const bad=pick(hiddenLeft);
      G.comebacks.push({eta:ri(2,6),name:cu.name,car:carName(c),price,issue:bad.t,warranty:warranted});
    }
  }
  if(warranted)log("🛡️ Garantie meeverkocht aan "+cu.name+" (+"+fmt(wFee)+"). Als er iets misloopt, is het uw rekening.");
  milestones();
  closeModal();
  modal("<b>🤝 Verkocht!</b><br>"+cu.name+" rijdt weg in de "+esc(carName(c))+" en toetert twee keer. "+chr().n+" "+(honest?"glimlacht tevreden en steekt een sigaret op.":"steekt iets te snel een sigaret op en kijkt de wagen nét iets te lang na.")+"<br><br>💰 <b class='money'>+"+fmt(price)+"</b>"+(profit>=0?" <span class='pill good'>winst "+fmt(profit)+"</span>":" <span class='pill bad'>verlies "+fmt(-profit)+"</span>"),
  [{t:"Kassa kassa",fn:()=>{closeModal();render()}}]);
}
/* huurkoop / rent-to-own: aanbetaling nu, wekelijkse afbetalingen met opslag */
const HK_WEEKS=8;
const FIN_COMMISSION=0.015; // bankfinanciering: dossiercommissie/kickback op de verkoopprijs
const ENV_DISCOUNT=0.08, ENV_HEAT=5, ENV_ODDS=0.10; // zwart-geld enveloppe: korting + keen + heat
function huurkoopTerms(c){
  const base=askValue(c);
  const down=Math.round(base*.30/1000)*1000;
  const total=Math.round(base*1.12/1000)*1000;
  const perWeek=Math.max(1000,Math.round((total-down)/HK_WEEKS/1000)*1000);
  return {down,total,perWeek,weeks:HK_WEEKS};
}
function startHuurkoop(){
  const cu=G.custs.find(x=>x.id===NEG.cid),c=getCar(NEG.carId);if(!cu||!c)return;
  const t=huurkoopTerms(c);
  G.cash+=t.down;G.earned+=t.down;G.sold++;G.wkSold=(G.wkSold||0)+1;
  G.rentDeals=G.rentDeals||[];
  G.rentDeals.push({name:cu.name,carName:carName(c),car:{...c},down:t.down,perWeek:t.perWeek,total:t.total,weeksLeft:t.weeks,collected:t.down});
  G.mile.rentToOwn=1;
  const cix=G.cars.findIndex(x=>x.id===c.id);if(cix>=0)G.cars.splice(cix,1);
  G.custs=G.custs.filter(x=>x.id!==cu.id);
  stamp("HUURKOOP!","gold");sfx("kaching");popNum("+"+fmt(t.down),"pgreen");addXP(12);confetti(20);
  log("💳 Huurkoop met "+cu.name+" voor de "+carName(c)+": "+fmt(t.down)+" contant, dan "+t.weeks+"× "+fmt(t.perWeek)+"/week (totaal "+fmt(t.total)+"). De wagen is vertrokken.");
  enrollLoyal(cu.name);
  closeModal();
  modal("<b>💳 Huurkoop getekend!</b><br>"+cu.name+" rijdt weg met de "+esc(carName(c))+" en een handdruk. Ge krijgt <b class='money'>"+fmt(t.down)+"</b> aanbetaling nu, en de rest druppelt binnen — "+t.weeks+" weken lang.",
   [{t:"Op de pof, maar oké",fn:()=>{closeModal();render()}}]);
}

/* bulk-plaatdeal: de platenman biedt af en toe 'nen desem plaatjes' aan met korting */
function plateSinglePrice(){return Math.round(75000*shadyMult()*platePerkMul());}
function genPlateDeal(){const single=plateSinglePrice();const n=ri(3,4);const per=Math.round(single*rnd(.55,.65)/1000)*1000;return {n,per,single};}
function buyBulkPlates(){
  const d=G.plateDeal;if(!d)return;

  for(let i=0;i<d.n;i++)G.plates.push({weeks:8,shady:Math.random()<.12,code:plateCode()});

  toast("🔴 "+d.n+" ZZ-platen in de kluis.");render();
}
function passPlateDeal(){G.plateDeal=null;save();render();}
function shadyPlate(){

  modal("Een man in een trainingsvest overhandigt je een plaat in een Delhaize-zak. \"Niet vragen waar ze vandaan komt, hé.\"",

     closeModal();render()}},
   {t:"Toch niet",cls:"ghost",fn:closeModal}]);
}

/* ============ 3D SHOWROOM ============ */
let R3=null;
function show3D(c,keepBehind){
  const w=Math.min(window.innerWidth-70,460);
  modal('<div class="center"><b>🌀 '+esc(carName(c))+'</b> <span class="dim small">('+c.year+' · '+COLORS[c.col].n+')</span></div><div id="c3dwrap"><canvas id="c3d" width="'+w+'" height="'+Math.round(w*.68)+'"></canvas></div><div class="center small dim">De draaischijf van de showroom. Mooi hé.</div>',
   [{t:"Terug",fn:()=>{stop3D();closeModal();render()}}]);
  try{init3D(c,w)}catch(e){$("c3dwrap").innerHTML='<div class="dim small center">3D-viewer kon niet laden (geen internet voor Three.js?)</div>'}
}
function stop3D(){if(R3){cancelAnimationFrame(R3.af);R3.ren.dispose();R3=null}}
function init3D(c,w){
  if(typeof THREE==="undefined")throw 0;
  stop3D();
  const cv=$("c3d"),h=Math.round(w*.68);
  const ren=new THREE.WebGLRenderer({canvas:cv,antialias:true,alpha:true});
  ren.setSize(w,h,false);
  const sc=new THREE.Scene();
  const cam=new THREE.PerspectiveCamera(38,w/h,0.1,100);
  const L=SPECS[c.ci].len;
  cam.position.set(L*1.32,L*.6,L*1.32);cam.lookAt(0,L*.17,0);
  sc.add(new THREE.HemisphereLight(0xffe8cc,0x241a38,.95));
  const key=new THREE.DirectionalLight(0xfff3e0,.85);key.position.set(4,8,3);sc.add(key);
  const rim=new THREE.PointLight(0xff5d9e,.55,22);rim.position.set(-5,3,-4);sc.add(rim);
  const warm=new THREE.PointLight(0xffb347,.4,22);warm.position.set(5,2,-3);sc.add(warm);
  const grp=new THREE.Group();
  const disc=new THREE.Mesh(new THREE.CylinderGeometry(L*.72,L*.78,.14,48),
    new THREE.MeshPhongMaterial({color:0x3c3057,shininess:30}));
  disc.position.y=-.07;grp.add(disc);
  const ring=new THREE.Mesh(new THREE.TorusGeometry(L*.72,.025,8,64),
    new THREE.MeshPhongMaterial({color:0xffb347,emissive:0x6b4310}));
  ring.rotation.x=Math.PI/2;ring.position.y=.012;grp.add(ring);
  buildCar(grp,c);
  sc.add(grp);
  R3={ren,sc,cam,grp,af:0};
  const anim=()=>{grp.rotation.y+=.011;ren.render(sc,cam);R3.af=requestAnimationFrame(anim)};
  anim();
}
function buildCar(grp,c){
  const sp=SPECS[c.ci],S=SHAPES[sp.s],hex=COLORS[c.col].h;
  const k=sp.len/100,X=x=>(x-50)*k,Y=y=>y*k,Wd=S.wid||1.7;
  const paint=new THREE.MeshPhongMaterial({color:new THREE.Color(hex),shininess:80,specular:0x666677});
  const glass=new THREE.MeshPhongMaterial({color:0x49688a,shininess:110,specular:0xaabbcc});
  const dark=new THREE.MeshPhongMaterial({color:0x16141d,shininess:20});
  // body: the same real side profile as the 2D sprite, with wheel arches cut out
  const b=S.b.flatMap(p=>p[2]?[p,p]:[p]),mid=(a,q)=>[(a[0]+q[0])/2,(a[1]+q[1])/2];
  const sh=new THREE.Shape();
  sh.moveTo(X(b[0][0]),Y(b[0][1]));
  for(let i=1;i<b.length-1;i++){const m=mid(b[i],b[i+1]);sh.quadraticCurveTo(X(b[i][0]),Y(b[i][1]),X(m[0]),Y(m[1]))}
  sh.lineTo(X(b[b.length-1][0]),Y(b[b.length-1][1]));
  const R=S.wr+1.7,a0=Math.asin((S.gy-S.wr)/R);
  const arch=cx=>{sh.lineTo(X(cx+R*Math.cos(a0)),Y(S.gy));
    sh.absarc(X(cx),Y(S.wr),R*k,a0,Math.PI-a0,false);
    sh.lineTo(X(cx-R*Math.cos(a0)),Y(S.gy))};
  arch(S.fw);arch(S.rw);
  sh.lineTo(X(b[0][0]),Y(b[0][1]));
  const geo=new THREE.ExtrudeGeometry(sh,{depth:Wd,bevelEnabled:true,bevelThickness:.045,bevelSize:.045,bevelSegments:2,curveSegments:10});
  geo.translate(0,0,-Wd/2);
  grp.add(new THREE.Mesh(geo,paint));
  // glass, slightly wider than the body so it reads from every angle
  for(const wp of S.win){
    const ws=new THREE.Shape();
    ws.moveTo(X(wp[0][0]),Y(wp[0][1]));
    for(let i=1;i<wp.length;i++)ws.lineTo(X(wp[i][0]),Y(wp[i][1]));
    const g=new THREE.ExtrudeGeometry(ws,{depth:Wd+.16,bevelEnabled:false});
    g.translate(0,0,-(Wd+.16)/2);
    grp.add(new THREE.Mesh(g,glass));
  }
  // wheels
  const wm=new THREE.MeshPhongMaterial({color:0x141219,shininess:12});
  const hub=new THREE.MeshPhongMaterial({color:0xc9c8d3,shininess:70});
  [[S.fw,1],[S.fw,-1],[S.rw,1],[S.rw,-1]].forEach(q=>{
    const z=q[1]*(Wd/2-.09);
    const t=new THREE.Mesh(new THREE.CylinderGeometry(S.wr*k,S.wr*k,.22,20),wm);
    t.rotation.x=Math.PI/2;t.position.set(X(q[0]),Y(S.wr),z);grp.add(t);
    const hb=new THREE.Mesh(new THREE.CylinderGeometry(S.wr*k*.52,S.wr*k*.52,.24,14),hub);
    hb.rotation.x=Math.PI/2;hb.position.set(X(q[0]),Y(S.wr),z+q[1]*.005);grp.add(hb);
  });
  // lights
  const hlm=new THREE.MeshPhongMaterial({color:0xffe9b0,emissive:0x8a7433});
  const tlm=new THREE.MeshPhongMaterial({color:0xd93840,emissive:0x661116});
  const lamps=(x,y,mat)=>{[1,-1].forEach(sgn=>{
    const m=new THREE.Mesh(new THREE.BoxGeometry(.1,.16,Wd*.22),mat);
    m.position.set(X(x),Y(y),sgn*(Wd/2-Wd*.16));grp.add(m)})};
  if(sp.hl!=="pop")lamps(S.hl[0]+1.5,S.hl[1],hlm);
  lamps(S.tl[0]-.8,S.tl[1],tlm);
  // spoiler
  const wing=sp.w||((c.tuned||0)>1?1:0);
  if(wing){const[rx,ry]=S.rd;
    const bl=new THREE.Mesh(new THREE.BoxGeometry(k*9,k*1.4,Wd*.86),dark);
    bl.position.set(X(rx+3),Y(ry+(wing===2?4.5:1.2)),0);grp.add(bl);
    if(wing===2)[1,-1].forEach(sgn=>{
      const st=new THREE.Mesh(new THREE.BoxGeometry(k*1.2,k*3.4,.05),dark);
      st.position.set(X(rx+3),Y(ry+2.2),sgn*Wd*.3);grp.add(st)});
  }
}
